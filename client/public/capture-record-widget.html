<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Recording</title>
<!--
  v2.1 round 125-127 (Terry 2026-06-11/12) — PDR screen-recording widget.

  A small frameless always-on-top window (content-protected, so it
  never appears in the recording) that BOTH shows the recording
  controls AND hosts the recording engine: getUserMedia with the
  desktop source main hands over, MediaRecorder producing WebM
  chunks every second, each chunk streamed to main over IPC where it
  appends to a temp file.

  Round 126 added: Mute (live audio-track toggle), Snap
  (mid-recording screenshot), live size readout, quality presets.
  Round 127 added: quality cycle button ON the bar, the Blur flow
  (pause → select an area on a frozen frame → resume → the saved MP4
  blurs that area for that stretch of the recording — segments are
  metadata only here; FFmpeg applies them at save time), fixed-width
  Pause/Mute buttons so the bar never shifts or clips, and a proper
  ghost-icon close button in PDR's titlebar style.

  Layout state: the bar communicates through the dot (pulsing red =
  recording, grey = paused) and button labels — no separate status
  text. While saving/discarding, the size readout becomes the status.

  Self-contained vanilla HTML/JS, same as capture-overlay.html —
  this is OS chrome, not app UI.
-->
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #16161a;
    user-select: none;
    -webkit-user-select: none;
    font: 500 13px/1.4 system-ui, 'Segoe UI', sans-serif;
    color: #fff;
  }
  #bar {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 100%;
    padding: 0 10px 0 12px;
    box-sizing: border-box;
    -webkit-app-region: drag;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 12px;
  }
  #dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #e5484d;
    flex-shrink: 0;
    animation: pulse 1.6s ease-in-out infinite;
  }
  #dot.paused {
    animation: none;
    background: #c8c8cf;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
  #time {
    font-variant-numeric: tabular-nums;
    min-width: 40px;
    font-size: 14px;
  }
  /* Live size of the captured footage; doubles as the Saving /
     Discarding status once the recording finishes. */
  #size {
    font-variant-numeric: tabular-nums;
    color: #9a9aa3;
    font-size: 11px;
    flex: 1 1 0;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
  }
  button {
    -webkit-app-region: no-drag;
    border: 1px solid rgba(255, 255, 255, 0.18);
    background: rgba(255, 255, 255, 0.06);
    color: #fff;
    border-radius: 8px;
    height: 32px;
    padding: 0 9px;
    font: 500 11.5px/1 system-ui, 'Segoe UI', sans-serif;
    cursor: pointer;
    flex-shrink: 0;
  }
  button:hover { background: rgba(255, 255, 255, 0.14); }
  button:disabled { opacity: 0.45; cursor: default; }
  /* Fixed widths for the two label-swapping buttons so the bar never
     reflows (round 127 — the swap to "Resume" used to push the close
     button out of the window). */
  #pause { width: 62px; padding: 0; }
  #mute { width: 60px; padding: 0; display: none; }
  #mute.muted {
    color: #f2b8ba;
    border-color: rgba(229, 72, 77, 0.55);
  }
  #blur.active {
    color: #f5d98a;
    border-color: rgba(212, 175, 55, 0.65);
  }
  #quality { width: 70px; padding: 0; }
  #stop {
    background: #e5484d;
    border-color: #e5484d;
    font-weight: 600;
    padding: 0 12px;
  }
  #stop:hover { background: #f2555a; }
  /* Ghost icon close — PDR titlebar button family (borderless,
     round, hover wash), not a bordered text glyph (round 127). */
  #cancel {
    width: 28px;
    height: 28px;
    padding: 0;
    border: none;
    border-radius: 50%;
    background: transparent;
    color: #9a9aa3;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  #cancel:hover { background: rgba(255, 255, 255, 0.14); color: #fff; }
  #cancel svg { width: 13px; height: 13px; display: block; }
</style>
</head>
<body>
  <div id="bar">
    <div id="dot"></div>
    <span id="time">0:00</span>
    <span id="size">0 KB</span>
    <button id="blur" type="button" title="Blur an area — pauses, lets you pick the area, and the saved video blurs it until you click again">Blur</button>
    <button id="quality" type="button" title="Recording quality — click to change">Standard</button>
    <button id="snap" type="button" title="Take a screenshot of what's being recorded — it goes into your library too">Snap</button>
    <button id="mute" type="button" title="Mute system audio for part of the recording">Mute</button>
    <button id="pause" type="button" title="Pause recording">Pause</button>
    <button id="stop" type="button" title="Stop and save to your library">Stop</button>
    <button id="cancel" type="button" title="Discard this recording" aria-label="Discard this recording">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
    </button>
  </div>
<script>
(function () {
  var pdr = window.pdr;
  var dot = document.getElementById('dot');
  var timeEl = document.getElementById('time');
  var sizeEl = document.getElementById('size');
  var blurBtn = document.getElementById('blur');
  var qualityBtn = document.getElementById('quality');
  var snapBtn = document.getElementById('snap');
  var muteBtn = document.getElementById('mute');
  var pauseBtn = document.getElementById('pause');
  var stopBtn = document.getElementById('stop');
  var cancelBtn = document.getElementById('cancel');
  var allButtons = [blurBtn, qualityBtn, snapBtn, muteBtn, pauseBtn, stopBtn, cancelBtn];

  var recorder = null;
  var stream = null;
  var cancelled = false;
  var finished = false;
  var startedAtMs = 0;
  var pausedTotalMs = 0;
  var pausedAtMs = 0;
  var paused = false;
  var capturedBytes = 0;
  var muted = false;
  var quality = 'standard';
  var QUALITY_ORDER = ['compact', 'standard', 'high'];
  var QUALITY_LABEL = { compact: 'Compact', standard: 'Standard', high: 'High' };
  var blurActive = false;       // a blur segment is currently open
  var blurSelecting = false;    // the selection overlay is up

  function fmt(ms) {
    var s = Math.max(0, Math.floor(ms / 1000));
    var m = Math.floor(s / 60);
    var r = s % 60;
    return m + ':' + (r < 10 ? '0' : '') + r;
  }
  function fmtBytes(n) {
    if (n < 1024 * 1024) return Math.max(1, Math.round(n / 1024)) + ' KB';
    return (n / (1024 * 1024)).toFixed(1) + ' MB';
  }
  /** Position on the OUTPUT video's timeline — wall time minus every
   *  paused stretch. Frozen while paused, which is exactly why blur
   *  open/close stamps taken while paused line up with the footage. */
  function clockMs() {
    if (!startedAtMs) return 0;
    var now = Date.now();
    return Math.max(0, now - startedAtMs - pausedTotalMs - (paused ? (now - pausedAtMs) : 0));
  }
  setInterval(function () {
    if (!startedAtMs || finished) return;
    timeEl.textContent = fmt(clockMs());
  }, 400);

  function reportError(message) {
    try { if (pdr && pdr.capture && pdr.capture.recordError) pdr.capture.recordError({ message: message }); } catch (e) {}
  }
  function stopTracks() {
    try { if (stream) stream.getTracks().forEach(function (t) { t.stop(); }); } catch (e) {}
  }

  function doPause() {
    if (!recorder || paused || recorder.state !== 'recording') return;
    recorder.pause();
    paused = true;
    pausedAtMs = Date.now();
    pauseBtn.textContent = 'Resume';
    pauseBtn.title = 'Resume recording';
    dot.classList.add('paused');
  }
  function doResume() {
    if (!recorder || !paused || recorder.state !== 'paused') return;
    recorder.resume();
    paused = false;
    pausedTotalMs += Date.now() - pausedAtMs;
    pauseBtn.textContent = 'Pause';
    pauseBtn.title = 'Pause recording';
    dot.classList.remove('paused');
  }

  async function start(init) {
    try {
      if (init && init.quality && QUALITY_LABEL[init.quality]) {
        quality = init.quality;
        qualityBtn.textContent = QUALITY_LABEL[quality];
      }
      var videoConstraints = {
        mandatory: {
          chromeMediaSource: 'desktop',
          chromeMediaSourceId: init.sourceId,
          maxWidth: init.maxWidth || 3840,
          maxHeight: init.maxHeight || 2160,
          maxFrameRate: 30,
        },
      };
      try {
        if (init.audio) {
          // Windows desktop loopback — system audio, no driver needed.
          stream = await navigator.mediaDevices.getUserMedia({
            audio: { mandatory: { chromeMediaSource: 'desktop' } },
            video: videoConstraints,
          });
        } else {
          stream = await navigator.mediaDevices.getUserMedia({ audio: false, video: videoConstraints });
        }
      } catch (audioErr) {
        if (!init.audio) throw audioErr;
        stream = await navigator.mediaDevices.getUserMedia({ audio: false, video: videoConstraints });
      }

      var vTrack = stream.getVideoTracks()[0];
      var settings = vTrack && vTrack.getSettings ? vTrack.getSettings() : {};
      var hasAudio = stream.getAudioTracks().length > 0;
      if (pdr && pdr.capture && pdr.capture.recordStarted) {
        pdr.capture.recordStarted({ width: settings.width || null, height: settings.height || null, hasAudio: hasAudio });
      }
      if (hasAudio) {
        muteBtn.style.display = '';
        muteBtn.addEventListener('click', function () {
          muted = !muted;
          stream.getAudioTracks().forEach(function (t) { t.enabled = !muted; });
          muteBtn.textContent = muted ? 'Unmute' : 'Mute';
          muteBtn.classList.toggle('muted', muted);
          muteBtn.title = muted ? 'Sound is muted — click to record audio again' : 'Mute system audio for part of the recording';
        });
      }

      var mime = '';
      var candidates = ['video/webm;codecs=vp9,opus', 'video/webm;codecs=vp9', 'video/webm;codecs=vp8,opus', 'video/webm'];
      for (var i = 0; i < candidates.length; i++) {
        if (window.MediaRecorder && MediaRecorder.isTypeSupported(candidates[i])) { mime = candidates[i]; break; }
      }
      recorder = new MediaRecorder(stream, {
        mimeType: mime || undefined,
        videoBitsPerSecond: init.videoBitsPerSecond || 8_000_000,
        audioBitsPerSecond: 128_000,
      });
      recorder.ondataavailable = function (ev) {
        if (!ev.data || ev.data.size === 0) return;
        capturedBytes += ev.data.size;
        if (!finished) sizeEl.textContent = fmtBytes(capturedBytes);
        ev.data.arrayBuffer().then(function (buf) {
          try { if (pdr && pdr.capture && pdr.capture.recordChunk) pdr.capture.recordChunk(buf); } catch (e) {}
        });
      };
      recorder.onstop = function () {
        stopTracks();
        // Give the final ondataavailable chunk a beat to cross IPC.
        setTimeout(function () {
          if (cancelled) {
            if (pdr && pdr.capture && pdr.capture.recordCancelled) pdr.capture.recordCancelled();
          } else {
            if (pdr && pdr.capture && pdr.capture.recordStopped) pdr.capture.recordStopped({});
          }
        }, 250);
      };
      recorder.onerror = function (ev) {
        reportError((ev && ev.error && ev.error.message) || 'Recorder error');
      };
      recorder.start(1000); // 1s chunks → streamed to main
      startedAtMs = Date.now();
    } catch (err) {
      reportError((err && err.message) || 'Could not start the recorder');
    }
  }

  function finish(asCancel) {
    if (finished) return;
    finished = true;
    cancelled = !!asCancel;
    // Close any open blur segment at the current position so "blur
    // until the end" works without an explicit Unblur.
    if (blurActive) {
      blurActive = false;
      try { if (pdr && pdr.capture && pdr.capture.recordBlur) pdr.capture.recordBlur({ type: 'close', endMs: clockMs() }); } catch (e) {}
    }
    sizeEl.textContent = asCancel ? 'Discarding…' : 'Saving…';
    allButtons.forEach(function (b) { b.disabled = true; });
    try {
      if (recorder && recorder.state !== 'inactive') recorder.stop();
      else if (cancelled) { if (pdr && pdr.capture && pdr.capture.recordCancelled) pdr.capture.recordCancelled(); }
      else { if (pdr && pdr.capture && pdr.capture.recordStopped) pdr.capture.recordStopped({}); }
    } catch (e) {
      reportError('Stop failed: ' + e.message);
    }
  }

  // ── Round 127: quality cycle (Compact → Standard → High) ──
  // Mid-recording, the change applies to the SAVE quality (and is
  // remembered for future recordings); the live capture bitrate was
  // fixed when this recording started.
  qualityBtn.addEventListener('click', function () {
    if (finished) return;
    quality = QUALITY_ORDER[(QUALITY_ORDER.indexOf(quality) + 1) % QUALITY_ORDER.length];
    qualityBtn.textContent = QUALITY_LABEL[quality];
    try { if (pdr && pdr.capture && pdr.capture.recordQuality) pdr.capture.recordQuality({ quality: quality }); } catch (e) {}
  });

  // ── Round 127: Blur ──
  // Click while no blur is active: auto-pause (so the selection
  // overlay never appears in the footage), ask main to open the
  // area selector on the recorded screen. Main replies with
  // blur-opened + the area; we stamp the START time from the frozen
  // recording clock. Click again (Unblur): stamp the END. The saved
  // MP4 gets the blur applied between those two times.
  blurBtn.addEventListener('click', function () {
    if (finished || blurSelecting || !recorder) return;
    if (blurActive) {
      blurActive = false;
      blurBtn.textContent = 'Blur';
      blurBtn.classList.remove('active');
      blurBtn.title = 'Blur an area — pauses, lets you pick the area, and the saved video blurs it until you click again';
      try { if (pdr && pdr.capture && pdr.capture.recordBlur) pdr.capture.recordBlur({ type: 'close', endMs: clockMs() }); } catch (e) {}
      return;
    }
    blurSelecting = true;
    doPause();
    try { if (pdr && pdr.capture && pdr.capture.recordBlurRequest) pdr.capture.recordBlurRequest(); } catch (e) { blurSelecting = false; }
  });

  snapBtn.addEventListener('click', function () {
    if (finished) return;
    try { if (pdr && pdr.capture && pdr.capture.recordSnap) pdr.capture.recordSnap(); } catch (e) {}
  });
  pauseBtn.addEventListener('click', function () {
    if (!recorder || finished) return;
    if (paused) doResume(); else doPause();
  });
  stopBtn.addEventListener('click', function () { finish(false); });
  cancelBtn.addEventListener('click', function () { finish(true); });

  if (pdr && pdr.capture) {
    if (pdr.capture.onRecordInit) {
      pdr.capture.onRecordInit(function (init) { void start(init || {}); });
    }
    if (pdr.capture.onRecordDo) {
      pdr.capture.onRecordDo(function (cmd) {
        if (!cmd) return;
        if (cmd.action === 'stop') finish(false);
        else if (cmd.action === 'cancel') finish(true);
        else if (cmd.action === 'blur-opened') {
          // Main resolved the area selector. rect is in VIDEO pixels
          // (null = user cancelled the selection).
          blurSelecting = false;
          if (cmd.rect && !finished) {
            blurActive = true;
            blurBtn.textContent = 'Unblur';
            blurBtn.classList.add('active');
            blurBtn.title = 'Blurring that area — click to stop blurring from this point on';
            try { if (pdr && pdr.capture && pdr.capture.recordBlur) pdr.capture.recordBlur({ type: 'open', rect: cmd.rect, startMs: clockMs() }); } catch (e) {}
          }
          // Stay paused either way — the user resumes when ready,
          // exactly the pause → blur → resume flow Terry described.
        }
      });
    }
  }
})();
</script>
</body>
</html>
