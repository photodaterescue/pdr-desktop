<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <!-- v2.1 round 306 (Terry) — collage "Take screenshot" PREPARE bar. A small floating
       always-on-top window shown while the user navigates to the exact window/tab they
       want. "Capture region" then runs the region overlay (drag a box on the real screen);
       "Cancel" (or Esc) aborts. Buttons talk to main via the captureBar preload bridge. -->
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: transparent; overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif; -webkit-user-select: none; user-select: none; cursor: default; }
    .bar { display: flex; align-items: center; gap: 12px; height: 100%; box-sizing: border-box;
      padding: 0 14px 0 16px; background: #15152e; border: 1px solid rgba(254,194,66,0.32);
      border-radius: 14px; box-shadow: 0 10px 40px rgba(0,0,0,0.55); -webkit-app-region: drag; }
    .msg { flex: 1; min-width: 0; color: #d8d2ee; font-size: 12.5px; line-height: 1.3; -webkit-app-region: no-drag; }
    .msg b { color: #FEC242; font-weight: 700; }
    button { -webkit-app-region: no-drag; font: inherit; font-size: 12px; font-weight: 600;
      border: none; border-radius: 8px; padding: 8px 13px; cursor: pointer; white-space: nowrap; }
    .cap { background: #FEC242; color: #1a1830; }
    .cap:hover { background: #ffd778; }
    .cancel { background: rgba(255,255,255,0.08); color: #cfc8e8; }
    .cancel:hover { background: rgba(255,255,255,0.16); }
  </style>
</head>
<body>
  <div class="bar">
    <span class="msg">Go to the image you want, then <b>Capture region</b> and drag a box around it.</span>
    <button class="cap" id="cap" type="button">Capture region</button>
    <button class="cancel" id="cancel" type="button">Cancel</button>
  </div>
  <script>
    function cap() { try { window.pdr.captureBar.capture(); } catch (e) {} }
    function cancel() { try { window.pdr.captureBar.cancel(); } catch (e) {} }
    document.getElementById('cap').addEventListener('click', cap);
    document.getElementById('cancel').addEventListener('click', cancel);
    window.addEventListener('keydown', function (e) { if (e.key === 'Escape') cancel(); });
  </script>
</body>
</html>
