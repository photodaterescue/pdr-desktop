<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Select area</title>
<!--
  v2.1 (Terry 2026-06-11) — PDR region-capture overlay.

  Loaded by capture-manager.ts into a frameless always-on-top window
  covering one display. Receives the FROZEN full-screen frame over the
  capture:overlay-init channel (the grab happened before this window
  existed, so this page can never appear in the shot), shows it 1:1,
  and lets the user drag a rectangle: surrounding area dims, the
  selection stays at full brightness, a size badge tracks the corner.

  Esc or clicking away cancels. Enter takes the whole frozen frame.
  The chosen rect (display CSS pixels) goes back over
  capture:overlay-select; main scales it to native pixels and crops.

  Deliberately self-contained vanilla HTML/JS — this is OS chrome, not
  app UI: it must paint instantly, can't wait on the React bundle, and
  shares no components with the workspace.
-->
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    cursor: crosshair;
    user-select: none;
    -webkit-user-select: none;
    background: #000;
  }
  #shot {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  /* Full veil before the first drag begins. */
  #veil {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
  }
  /* During a drag the selection box's huge box-shadow becomes the
     veil — the box interior shows the frozen frame undimmed. */
  #selection {
    position: absolute;
    display: none;
    outline: 1.5px solid rgba(255, 255, 255, 0.95);
    box-shadow: 0 0 0 100000px rgba(0, 0, 0, 0.45);
  }
  #sizeBadge {
    position: absolute;
    display: none;
    padding: 3px 8px;
    border-radius: 6px;
    background: rgba(20, 20, 24, 0.92);
    color: #fff;
    font: 500 12px/1.4 system-ui, 'Segoe UI', sans-serif;
    letter-spacing: 0.02em;
    pointer-events: none;
    white-space: nowrap;
  }
  #hint {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    padding: 8px 16px;
    border-radius: 999px;
    background: rgba(20, 20, 24, 0.92);
    color: #fff;
    font: 500 13px/1.4 system-ui, 'Segoe UI', sans-serif;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  #hint .key {
    display: inline-block;
    padding: 0 5px;
    margin: 0 1px;
    border: 1px solid rgba(255, 255, 255, 0.35);
    border-radius: 4px;
    font-size: 11px;
  }
</style>
</head>
<body>
  <img id="shot" alt="" />
  <div id="veil"></div>
  <div id="selection"></div>
  <div id="sizeBadge"></div>
  <div id="hint">Drag to select an area &nbsp;·&nbsp; <span class="key">Enter</span> whole screen &nbsp;·&nbsp; <span class="key">Esc</span> cancel</div>
<script>
(function () {
  var pdr = window.pdr;
  var shot = document.getElementById('shot');
  var veil = document.getElementById('veil');
  var selection = document.getElementById('selection');
  var sizeBadge = document.getElementById('sizeBadge');
  var hint = document.getElementById('hint');

  if (pdr && pdr.capture && pdr.capture.onOverlayInit) {
    pdr.capture.onOverlayInit(function (info) {
      if (info && info.imageDataUrl) shot.src = info.imageDataUrl;
    });
  }

  function cancel() {
    if (pdr && pdr.capture && pdr.capture.overlayCancel) pdr.capture.overlayCancel();
  }
  function select(rect) {
    if (pdr && pdr.capture && pdr.capture.overlaySelect) pdr.capture.overlaySelect(rect);
  }

  var dragging = false;
  var startX = 0;
  var startY = 0;

  function currentRect(ev) {
    var x = Math.min(startX, ev.clientX);
    var y = Math.min(startY, ev.clientY);
    var w = Math.abs(ev.clientX - startX);
    var h = Math.abs(ev.clientY - startY);
    return { x: x, y: y, width: w, height: h };
  }

  function paintRect(r) {
    selection.style.display = 'block';
    selection.style.left = r.x + 'px';
    selection.style.top = r.y + 'px';
    selection.style.width = r.width + 'px';
    selection.style.height = r.height + 'px';
    sizeBadge.style.display = 'block';
    sizeBadge.textContent = r.width + ' × ' + r.height;
    // Badge under the bottom-right corner; flip above when cramped.
    var bx = r.x + r.width + 8;
    var by = r.y + r.height + 8;
    if (bx + 90 > window.innerWidth) bx = Math.max(4, r.x + r.width - 90);
    if (by + 24 > window.innerHeight) by = Math.max(4, r.y - 28);
    sizeBadge.style.left = bx + 'px';
    sizeBadge.style.top = by + 'px';
  }

  document.addEventListener('mousedown', function (ev) {
    if (ev.button !== 0) return;
    dragging = true;
    startX = ev.clientX;
    startY = ev.clientY;
    veil.style.display = 'none';
    hint.style.opacity = '0';
    paintRect({ x: startX, y: startY, width: 0, height: 0 });
  });

  document.addEventListener('mousemove', function (ev) {
    if (!dragging) return;
    paintRect(currentRect(ev));
  });

  document.addEventListener('mouseup', function (ev) {
    if (!dragging || ev.button !== 0) return;
    dragging = false;
    var r = currentRect(ev);
    if (r.width < 8 || r.height < 8) {
      // Stray click / micro-drag — back to the resting state rather
      // than capturing a sliver by accident.
      selection.style.display = 'none';
      sizeBadge.style.display = 'none';
      veil.style.display = 'block';
      hint.style.opacity = '1';
      return;
    }
    select(r);
  });

  document.addEventListener('keydown', function (ev) {
    if (ev.key === 'Escape') {
      ev.preventDefault();
      cancel();
    } else if (ev.key === 'Enter') {
      ev.preventDefault();
      select({ x: 0, y: 0, width: window.innerWidth, height: window.innerHeight });
    }
  });

  // Soften the hint once the user has had a moment to read it.
  setTimeout(function () { hint.style.opacity = '0.35'; }, 3500);
})();
</script>
</body>
</html>
