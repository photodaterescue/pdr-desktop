<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Recording</title>
<!--
  v2.1 round 125-127 (Terry 2026-06-11/12) — PDR screen-recording widget.

  A small frameless always-on-top window (content-protected, so it
  never appears in the recording) that BOTH shows the recording
  controls AND hosts the recording engine: getUserMedia with the
  desktop source main hands over, MediaRecorder producing WebM
  chunks every second, each chunk streamed to main over IPC where it
  appends to a temp file.

  Round 126 added: Mute (live audio-track toggle), Snap
  (mid-recording screenshot), live size readout, quality presets.
  Round 127 added: quality cycle button ON the bar, the Blur flow
  (pause → select an area on a frozen frame → resume → the saved MP4
  blurs that area for that stretch of the recording — segments are
  metadata only here; FFmpeg applies them at save time), fixed-width
  Pause/Mute buttons so the bar never shifts or clips, and a proper
  ghost-icon close button in PDR's titlebar style.

  Layout state: the bar communicates through the dot (pulsing red =
  recording, grey = paused) and button labels — no separate status
  text. While saving/discarding, the size readout becomes the status.

  Self-contained vanilla HTML/JS, same as capture-overlay.html —
  this is OS chrome, not app UI.
-->
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #16161a;
    user-select: none;
    -webkit-user-select: none;
    font: 500 13px/1.4 system-ui, 'Segoe UI', sans-serif;
    color: #fff;
  }
  #bar {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 100%;
    padding: 0 10px 0 12px;
    box-sizing: border-box;
    -webkit-app-region: drag;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 12px;
  }
  #dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #e5484d;
    flex-shrink: 0;
    animation: pulse 1.6s ease-in-out infinite;
  }
  #dot.paused {
    animation: none;
    background: #c8c8cf;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
  /* v3.0 round 413 (Terry) — PAUSED must be unmistakable (esp. during Blur
     config, which auto-pauses): the Resume button glows + pulses gold, the
     timer pulses gold, and the status reads "Paused". */
  #pause.pausing {
    color: #f5d98a;
    border-color: rgba(212, 175, 55, 0.85);
    animation: pausePulse 1.3s ease-in-out infinite;
  }
  @keyframes pausePulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
    50% { box-shadow: 0 0 9px 2px rgba(212, 175, 55, 0.8); }
  }
  #time.pausing {
    color: #f5d98a;
    animation: pulse 1.3s ease-in-out infinite;
  }
  #size.paused-status {
    color: #f5d98a;
    font-weight: 600;
  }
  #time {
    font-variant-numeric: tabular-nums;
    min-width: 40px;
    font-size: 14px;
  }
  /* Live size of the captured footage; doubles as the Saving /
     Discarding status once the recording finishes. Round 130: no
     longer flex-grows (that absorbed slack and hid the bar's true
     content width from the auto-sizer) — it sizes to its text, and
     the window sizes to the whole bar. */
  #size {
    font-variant-numeric: tabular-nums;
    color: #9a9aa3;
    font-size: 11px;
    min-width: 56px;
    white-space: nowrap;
  }
  button {
    -webkit-app-region: no-drag;
    border: 1px solid rgba(255, 255, 255, 0.18);
    background: rgba(255, 255, 255, 0.06);
    color: #fff;
    border-radius: 8px;
    height: 32px;
    padding: 0 9px;
    font: 500 11.5px/1 system-ui, 'Segoe UI', sans-serif;
    cursor: pointer;
    flex-shrink: 0;
  }
  button:hover { background: rgba(255, 255, 255, 0.14); }
  button:disabled { opacity: 0.45; cursor: default; }
  /* Fixed widths for the two label-swapping buttons so the bar never
     reflows (round 127 — the swap to "Resume" used to push the close
     button out of the window). */
  #pause { width: 62px; padding: 0; }
  #mute { width: 60px; padding: 0; display: none; }
  /* v3.0 round 413 (Terry) — EVERY engaged/active button is gold + gold
     text, uniform across the whole bar (Cam/Mic were blue, muted was red —
     the mix was confusing). State that used to be colour-coded (a muted mic)
     now reads from the button's LABEL, not its colour. */
  #mute.muted {
    color: #f5d98a;
    border-color: rgba(212, 175, 55, 0.65);
  }
  #blur.active {
    color: #f5d98a;
    border-color: rgba(212, 175, 55, 0.65);
  }
  #cam.active, #cam2.active {   /* v3.1 (Terry SS1) — Cam 2's "on" glow was scoped to #cam only, so it never lit */
    color: #f5d98a;
    border-color: rgba(212, 175, 55, 0.65);
  }
  #mic { width: 56px; padding: 0; }
  #mic.on {
    color: #f5d98a;
    border-color: rgba(212, 175, 55, 0.65);
  }
  #mic.muted {
    color: #f5d98a;
    border-color: rgba(212, 175, 55, 0.65);
  }
  #micSel {
    -webkit-app-region: no-drag;
    height: 32px;
    border: 1px solid rgba(255, 255, 255, 0.18);
    background: rgba(255, 255, 255, 0.06);
    color: #fff;
    border-radius: 8px;
    font: 500 11.5px/1 system-ui, 'Segoe UI', sans-serif;
    padding: 0 4px;
    cursor: pointer;
    flex-shrink: 0;
    max-width: 120px;
    display: none;
  }
  #micSel:hover { background: rgba(255, 255, 255, 0.14); }
  #micSel option { background: #16161a; color: #fff; }
  /* v3.0 round 411 — Clicks (click-ripple) toggle; gold 'on' like Blur. */
  /* v3.0 round 488 (Terry) — Clicks PULLED from v3.0 and hidden: the global
     click-hook it needs adds too much mouse lag during recording to ship. Kept in
     the markup (not deleted) so it returns in v3.1 once the hook is de-lagged.
     Auto-zoom (opt-in, default OFF) stays for the "help viewers follow the cursor"
     need and never runs the hook unless a user deliberately enables it. */
  #clicks { display: none !important; }
  #clicks.on {
    color: #f5d98a;
    border-color: rgba(212, 175, 55, 0.65);
  }
  /* v3.0 round 412 — Zoom (mark a zoom moment); gold 'active' while zoomed in. */
  #zoom.active {
    color: #f5d98a;
    border-color: rgba(212, 175, 55, 0.65);
  }
  /* v3.0 round 485 — Auto-zoom toward clicks; gold 'on' like Clicks. */
  #autozoom.on {
    color: #f5d98a;
    border-color: rgba(212, 175, 55, 0.65);
  }
  /* v3.0 round 414 — Unblur (remove the last blur area); shown only when >=1 blur. */
  #unblur { display: none; }
  /* Round 128 — quality is a real dropdown (Terry: cycling isn't
     discoverable). Styled to sit in the button family; the open list
     itself is OS-rendered. */
  #quality {
    -webkit-app-region: no-drag;
    width: 92px;
    height: 32px;
    border: 1px solid rgba(255, 255, 255, 0.18);
    background: rgba(255, 255, 255, 0.06);
    color: #fff;
    border-radius: 8px;
    font: 500 11.5px/1 system-ui, 'Segoe UI', sans-serif;
    padding: 0 4px;
    cursor: pointer;
    flex-shrink: 0;
  }
  #quality:hover { background: rgba(255, 255, 255, 0.14); }
  #quality:disabled { opacity: 0.45; }
  #quality option { background: #16161a; color: #fff; }
  /* Round 131 — Screen dropdown (armed only): pick which display to
     record, after the menu is up, never silently assumed. Same look
     as the quality dropdown. */
  #screen {
    -webkit-app-region: no-drag;
    height: 32px;
    border: 1px solid rgba(255, 255, 255, 0.18);
    background: rgba(255, 255, 255, 0.06);
    color: #fff;
    border-radius: 8px;
    font: 500 11.5px/1 system-ui, 'Segoe UI', sans-serif;
    padding: 0 4px;
    cursor: pointer;
    flex-shrink: 0;
    max-width: 132px;
    display: none;
  }
  #screen:hover { background: rgba(255, 255, 255, 0.14); }
  #screen option { background: #16161a; color: #fff; }
  #stop {
    background: #e5484d;
    border-color: #e5484d;
    font-weight: 600;
    padding: 0 12px;
  }
  #stop:hover { background: #f2555a; }
  /* Round 129 — the armed bar's Record button: same red family as
     Stop, the single obvious "go" control while everything else
     waits. */
  #record {
    background: #e5484d;
    border-color: #e5484d;
    font-weight: 600;
    padding: 0 14px;
    display: none;
  }
  #record:hover { background: #f2555a; }
  /* Ghost icon close — PDR titlebar button family (borderless,
     round, hover wash), not a bordered text glyph (round 127). */
  #cancel {
    width: 28px;
    height: 28px;
    padding: 0;
    border: none;
    border-radius: 50%;
    background: transparent;
    color: #9a9aa3;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  #cancel:hover { background: rgba(255, 255, 255, 0.14); color: #fff; }
  #cancel svg { width: 13px; height: 13px; display: block; }
  /* v3.1 (Terry) — SAVE/DISCARD double-check. Clicking Stop (or ✕ mid-recording) PAUSES the take and
     swaps the whole bar for this strip, so a mis-click after a minute of recording can never silently
     save or silently discard. Opaque over the bar; recording stays paused until a choice is made. */
  #confirm {
    position: absolute; inset: 0;
    display: none;
    align-items: center; justify-content: center; gap: 10px;
    background: #16161a;
    z-index: 60;
  }
  #confirm.show { display: flex; }
  #confirm .cfm-label { color: #e8e8ee; font: 600 12.5px/1 system-ui, 'Segoe UI', sans-serif; margin-right: 4px; }
  #confirm button {
    -webkit-app-region: no-drag;
    height: 32px; padding: 0 14px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.18);
    background: rgba(255, 255, 255, 0.06);
    color: #fff;
    font: 600 11.5px/1 system-ui, 'Segoe UI', sans-serif;
    cursor: pointer;
  }
  #confirm button:hover { background: rgba(255, 255, 255, 0.14); }
  /* Scoped under #confirm so these WIN over the generic '#confirm button' rule above (an id+type
     selector outranks a lone id — the round-1 strip rendered all-dark because of exactly that). */
  #confirm #cfmSave { background: #d4af37; border-color: #d4af37; color: #1f1a08; }
  #confirm #cfmSave:hover { background: #e3c04a; }
  #confirm #cfmDiscard { border-color: rgba(229, 72, 77, 0.75); color: #ff8a8e; }
  #confirm #cfmDiscard:hover { background: rgba(229, 72, 77, 0.18); }
</style>
</head>
<body>
  <div id="bar">
    <div id="dot"></div>
    <span id="time">0:00</span>
    <span id="size">0 KB</span>
    <select id="screen" title="Which screen to record"></select>
    <button id="area" type="button" title="Choose an area to record — arrange your windows first, then drag a box (or click a window)">Area</button>
    <button id="cam" type="button" title="Show or hide your camera bubble in the recording">Cam</button>
    <!-- v3.1 (Terry) — the camera BACKDROP now lives ON the camera bubble itself (the Backdrop pill),
         per camera — so it's off the bar (less clutter) and there's no "which camera?" confusion. -->
    <!-- v3.1 (Terry) — SECOND camera bubble. Only appears when Windows reports 2+ cameras. Runs
         alongside Cam or on its own — each button toggles its own bubble. -->
    <button id="cam2" type="button" title="Show or hide a second camera bubble (your other camera) in the recording" style="display:none">Cam 2</button>
    <!-- v3.1 (Terry 2026-07-11) — LIVE "cam only": hide the desktop behind a black screen so the footage shows just your camera(s); click again to bring the screen back. Switch as often as you like mid-recording. -->
    <button id="camonly" type="button" title="Cam only — hide the desktop and record just your camera(s). Click again to bring the screen back. You can switch any time while recording.">Cam only</button>
    <button id="mic" type="button" title="Record your microphone (voiceover) — turn it on before recording; while recording this mutes/unmutes your voice">Mic</button>
    <select id="micSel" title="Which microphone to record"></select>
    <button id="clicks" type="button" title="Show a gold ripple wherever you click — helps viewers follow your cursor in tutorials">Clicks</button>
    <button id="blur" type="button" title="Blur an area — pause, then drag a box; the saved video blurs it. Add as many as you like.">Blur</button>
    <button id="unblur" type="button" title="Remove the last blur area you added">Unblur</button>
    <button id="zoom" type="button" title="Zoom in on the action — click to zoom toward the center, click again to zoom back out. Applied to the saved video.">Zoom</button>
    <button id="autozoom" type="button" title="Auto-zoom toward where you click — eases in on each click, eases back out when you pause. Applied to the saved video.">Auto-zoom</button>
    <select id="quality" title="Recording quality — affects this recording's save quality and future recordings. Tiny makes the smallest files (saves at up to 1280px wide).">
      <option value="tiny">Tiny</option>
      <option value="compact">Compact</option>
      <option value="standard" selected>Standard</option>
      <option value="high">High</option>
    </select>
    <button id="snap" type="button" title="Take a screenshot of what's being recorded — it goes into your library too">Snap</button>
    <button id="mute" type="button" title="Mute system audio for part of the recording">Mute</button>
    <button id="pause" type="button" title="Pause recording">Pause</button>
    <button id="record" type="button" title="Start recording — until you press this, nothing is captured">Record</button>
    <button id="stop" type="button" title="Stop and save to your library">Stop</button>
    <button id="cancel" type="button" title="Discard this recording" aria-label="Discard this recording">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
    </button>
  </div>
  <!-- v3.1 (Terry) — the Stop/✕ double-check strip: the take is PAUSED while this is up. -->
  <div id="confirm">
    <span class="cfm-label" id="cfmLabel">Save this recording?</span>
    <button id="cfmSave" type="button" title="Save the recording to your library">Save recording</button>
    <button id="cfmDiscard" type="button" title="Throw this take away and stay ready to record again — nothing is saved">Discard</button>
    <button id="cfmKeep" type="button" title="Go back — keep recording from where you paused">Keep recording</button>
  </div>
<script>
(function () {
  var pdr = window.pdr;
  var dot = document.getElementById('dot');
  var timeEl = document.getElementById('time');
  var sizeEl = document.getElementById('size');
  var screenSel = document.getElementById('screen');
  var areaBtn = document.getElementById('area');
  var camBtn = document.getElementById('cam');
  var cam2Btn = document.getElementById('cam2');     // v3.1 (Terry) — second camera bubble (shown when 2+ cameras exist)
  var camOnlyBtn = document.getElementById('camonly');   // v3.1 (Terry 2026-07-11) — live "cam only" (desktop-hiding curtain)
  var micBtn = document.getElementById('mic');
  var micSel = document.getElementById('micSel');
  var clicksBtn = document.getElementById('clicks');
  var blurBtn = document.getElementById('blur');
  var unblurBtn = document.getElementById('unblur');
  var zoomBtn = document.getElementById('zoom');
  var autoZoomBtn = document.getElementById('autozoom');
  var qualitySel = document.getElementById('quality');
  var snapBtn = document.getElementById('snap');
  var muteBtn = document.getElementById('mute');
  var pauseBtn = document.getElementById('pause');
  var recordBtn = document.getElementById('record');
  var stopBtn = document.getElementById('stop');
  var cancelBtn = document.getElementById('cancel');
  var cfmSaveBtn = document.getElementById('cfmSave');       // v3.1 (Terry) — stop-save double-check buttons; wired for PDR tooltips too
  var cfmDiscardBtn = document.getElementById('cfmDiscard');
  var cfmKeepBtn = document.getElementById('cfmKeep');
  var allButtons = [screenSel, areaBtn, camBtn, cam2Btn, camOnlyBtn, micBtn, micSel, clicksBtn, blurBtn, unblurBtn, zoomBtn, autoZoomBtn, qualitySel, snapBtn, muteBtn, pauseBtn, recordBtn, stopBtn, cancelBtn, cfmSaveBtn, cfmDiscardBtn, cfmKeepBtn];   // v3.1 (Terry 2026-07-11) — camOnlyBtn added so it gets the PDR tooltip (its native title was leaking) + the enable/disable

  var recorder = null;
  var stream = null;
  var cancelled = false;
  var finished = false;
  var startedAtMs = 0;
  var pausedTotalMs = 0;
  var pausedAtMs = 0;
  var paused = false;
  var capturedBytes = 0;
  var muted = false;
  var quality = 'standard';
  var QUALITY_LABEL = { tiny: 'Tiny', compact: 'Compact', standard: 'Standard', high: 'High' };   // v3.1 (Terry) — + Tiny (smallest files)
  // Capture bitrate per preset — applied at the moment Record is
  // pressed, so a quality change made while armed affects the live
  // capture too (mid-recording changes still only affect the save).
  var QUALITY_BITRATE = { tiny: 2000000, compact: 4000000, standard: 8000000, high: 12000000 };   // v3.1 (Terry) — Tiny records at 2 Mbps; the save step downscales to ≤1280w too
  var blurCount = 0;            // number of blur regions currently open (multiple allowed)
  var blurSelecting = false;    // the selection overlay is up
  var rearming = false;         // v3.1 (Terry) — Discard-then-rearm in flight (stopping the take to re-arm)
  var currentRegion = null;     // v3.1 (Terry) — the live area crop (for the "Ready · W×H" readout on re-arm)
  // Round 129 — armed stage: init is stored, the engine stays cold,
  // and NOTHING is captured until the user presses Record.
  var storedInit = null;
  var armed = false;
  // v3.0 round 410 — microphone / voiceover state.
  var micOn = false;          // armed preference: record the mic
  var micDeviceId = '';       // chosen mic ('' = system default)
  var micStream = null;       // the live mic MediaStream
  var micTrack = null;        // its audio track (live mute target)
  var sysAudioTrack = null;   // the system-audio track (Mute target, also feeds the mix)
  var audioCtx = null;        // Web Audio mixer: system + mic → one track
  var micMuted = false;       // live mic mute while recording
  var rippleOn = false;       // v3.0 round 411 — click-ripple overlay on
  var zoomActive = false;     // v3.0 round 412 — a zoom moment is currently open
  var autoZoomOn = false;     // v3.0 round 485 — auto-zoom toward clicks enabled

  var bar = document.getElementById('bar');
  // Round 130 — size the WINDOW to the bar's real content so no
  // control can ever clip (the bug where Record fell off the right
  // edge once Area was added). Sum every visible child + gaps +
  // the bar's own padding/border, and ask main to match. rAF lets
  // layout/fonts settle before measuring.
  function requestResize() {
    requestAnimationFrame(function () {
      var total = 22 + 2; // bar padding (12+10) + border (1+1)
      var visible = 0;
      for (var i = 0; i < bar.children.length; i++) {
        var c = bar.children[i];
        if (getComputedStyle(c).display === 'none') continue;
        total += c.offsetWidth;
        visible++;
      }
      total += Math.max(0, visible - 1) * 8; // inter-child gaps
      total += 10; // small breathing margin
      try { if (pdr && pdr.capture && pdr.capture.recordResize) pdr.capture.recordResize(Math.ceil(total)); } catch (e) {}
    });
  }

  function enterArmedUI(region) {
    armed = true;
    dot.classList.add('paused');
    sizeEl.textContent = region ? 'Ready · ' + region.width + '×' + region.height : 'Ready';
    // Explicit 'inline-block', NOT '' — #record's CSS default is
    // display:none, so clearing the inline style would leave it
    // hidden (round 130 bug: the armed bar showed no Record button;
    // .click()-by-id tests fired on the hidden element and missed it).
    recordBtn.style.display = 'inline-block';
    stopBtn.style.display = 'none';
    pauseBtn.disabled = true;
    snapBtn.disabled = true;
    blurBtn.disabled = true;
    zoomBtn.disabled = true;
    // Area re-pick only makes sense BEFORE recording starts — the
    // crop applies to the whole video.
    areaBtn.style.display = 'inline-block';
    areaBtn.disabled = false;
    // Screen dropdown only when there's more than one display, and
    // only while armed (you can't change screen mid-recording).
    if (screenSel.options.length > 1) screenSel.style.display = 'inline-block';
    updateMicSelVisibility();
    requestResize();
  }
  function enterRecordingUI() {
    armed = false;
    dot.classList.remove('paused');
    sizeEl.textContent = '0 KB';
    recordBtn.style.display = 'none';
    stopBtn.style.display = 'inline-block';
    pauseBtn.disabled = false;
    snapBtn.disabled = false;
    blurBtn.disabled = false;
    zoomBtn.disabled = false;
    // Area + Screen are meaningless once recording — hide them
    // (frees bar space; the screen/crop are locked in).
    areaBtn.style.display = 'none';
    screenSel.style.display = 'none';
    requestResize();
  }

  function fmt(ms) {
    var s = Math.max(0, Math.floor(ms / 1000));
    var m = Math.floor(s / 60);
    var r = s % 60;
    return m + ':' + (r < 10 ? '0' : '') + r;
  }
  function fmtBytes(n) {
    if (n < 1024 * 1024) return Math.max(1, Math.round(n / 1024)) + ' KB';
    return (n / (1024 * 1024)).toFixed(1) + ' MB';
  }
  /** Position on the OUTPUT video's timeline — wall time minus every
   *  paused stretch. Frozen while paused, which is exactly why blur
   *  open/close stamps taken while paused line up with the footage. */
  function clockMs() {
    if (!startedAtMs) return 0;
    var now = Date.now();
    return Math.max(0, now - startedAtMs - pausedTotalMs - (paused ? (now - pausedAtMs) : 0));
  }
  setInterval(function () {
    if (!startedAtMs || finished) return;
    timeEl.textContent = fmt(clockMs());
  }, 400);

  function reportError(message) {
    try { if (pdr && pdr.capture && pdr.capture.recordError) pdr.capture.recordError({ message: message }); } catch (e) {}
  }
  function stopTracks() {
    try { if (stream) stream.getTracks().forEach(function (t) { t.stop(); }); } catch (e) {}
    // v3.0 round 410 — also release the mic + close the audio mixer.
    try { if (micStream) micStream.getTracks().forEach(function (t) { t.stop(); }); } catch (e) {}
    try { if (audioCtx && audioCtx.state !== 'closed') audioCtx.close(); } catch (e) {}
  }

  function doPause() {
    if (!recorder || paused || recorder.state !== 'recording') return;
    recorder.pause();
    paused = true;
    pausedAtMs = Date.now();
    pauseBtn.textContent = 'Resume';
    pauseBtn.title = 'Resume recording';
    dot.classList.add('paused');
    // v3.0 round 413 (Terry) — make PAUSED obvious: pulse Resume + the timer
    // gold and flag the status, so blur-config can't be mistaken for live.
    pauseBtn.classList.add('pausing');
    timeEl.classList.add('pausing');
    sizeEl.textContent = 'Paused';
    sizeEl.classList.add('paused-status');
  }
  function doResume() {
    if (!recorder || !paused || recorder.state !== 'paused') return;
    recorder.resume();
    paused = false;
    pausedTotalMs += Date.now() - pausedAtMs;
    pauseBtn.textContent = 'Pause';
    pauseBtn.title = 'Pause recording';
    dot.classList.remove('paused');
    // v3.0 round 413 — clear the paused pulse + restore the live size readout.
    pauseBtn.classList.remove('pausing');
    timeEl.classList.remove('pausing');
    sizeEl.classList.remove('paused-status');
    sizeEl.textContent = fmtBytes(capturedBytes);
  }

  async function start(init) {
    try {
      var videoConstraints = {
        mandatory: {
          chromeMediaSource: 'desktop',
          chromeMediaSourceId: init.sourceId,
          maxWidth: init.maxWidth || 3840,
          maxHeight: init.maxHeight || 2160,
          maxFrameRate: 30,
        },
      };
      try {
        if (init.audio) {

      var settings = vTrack && vTrack.getSettings ? vTrack.getSettings() : {};

      // and BLEND it with the system audio into ONE track via Web Audio (WebM is
      // unreliable with two audio tracks). System audio keeps its own track so
      // Mute still works (disabling it feeds silence into the mix); the mic gets
      // its own live mute on the Mic button. If the mic is blocked, recording
      // continues without it.
      var recordStream = stream;

        pdr.capture.recordStarted({ width: settings.width || null, height: settings.height || null, hasAudio: hasAnyAudio });
      }
      if (sysHasAudio) {
        // Explicit value, NOT '' — #mute's CSS default is display:none.
        muteBtn.style.display = 'inline-block';
        muteBtn.addEventListener('click', function () {
          muted = !muted;
          if (sysAudioTrack) sysAudioTrack.enabled = !muted;
          muteBtn.textContent = muted ? 'Unmute' : 'Mute';
          muteBtn.classList.toggle('muted', muted);
          muteBtn.title = muted ? 'System sound is muted — click to record it again' : 'Mute system audio for part of the recording';
        });
      }
      // The Mic button now means "mute/unmute my voice" for the rest of the
      // recording (its armed on/off role is over). Hidden if there's no mic.
      if (micTrack) {
        micBtn.style.display = 'inline-block';
        micBtn.classList.add('on');
        micBtn.classList.remove('muted');
        micBtn.textContent = 'Mic';
        micBtn.title = 'Your microphone is recording — click to mute/unmute your voice';
      } else {
        micBtn.style.display = 'none';
      }

      var mime = '';

            if (pdr && pdr.capture && pdr.capture.recordDiscardRearm) pdr.capture.recordDiscardRearm();

    }
  }

    }
  }

  }

  // ── Round 128: quality dropdown (was a cycle button — Terry:
  // a dropdown is what people expect). Mid-recording, the change
  // applies to the SAVE quality (and is remembered for future
  // recordings); the live capture bitrate was fixed at start.
  qualitySel.addEventListener('change', function () {

  });
  // v3.1 (Terry 2026-07-11) — LIVE "cam only": main owns the curtain window; the active state comes
  // back via record-do {action:'cam-state', camOnly}. Works armed or recording.
  if (camOnlyBtn) camOnlyBtn.addEventListener('click', function () {
    if (finished) return;
    try { if (pdr && pdr.capture && pdr.capture.recordCamOnlyToggle) pdr.capture.recordCamOnlyToggle(); } catch (e) {}
  });
  // Show the Cam 2 button only when Windows reports 2+ cameras (labels don't matter, count does).
  (function detectSecondCamera() {
    try {

  // v3.1 (Terry) — the camera BACKDROP picker moved OFF the bar and ONTO the camera bubble itself
  // (the Backdrop pill, per camera — see capture-cam.html). Nothing backdrop-related lives on the bar now.

  // ── v3.0 round 410: Microphone / voiceover ──
  // ARMED: the Mic button toggles whether your voice is recorded (the device
  // dropdown appears for 2+ mics); the choice is reported to main so it persists.
  // RECORDING: the same button live-mutes/unmutes your voice.
  function updateMicSelVisibility() {
    var show = armed && micOn && micSel.options.length > 1;
    micSel.style.display = show ? 'inline-block' : 'none';
    requestResize();
  }
  function enumerateMics() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) return;
    navigator.mediaDevices.enumerateDevices().then(function (devs) {

        n++;

        o.value = d.deviceId;

    if (finished) return;

      if (!micTrack) return;
      micMuted = !micMuted;
      micTrack.enabled = !micMuted;
      micBtn.textContent = micMuted ? 'Muted' : 'Mic';
      micBtn.classList.toggle('muted', micMuted);
      micBtn.classList.toggle('on', !micMuted);
      micBtn.title = micMuted ? 'Your voice is muted — click to record it again' : 'Your microphone is recording — click to mute/unmute your voice';

    micBtn.classList.toggle('on', micOn);
    micBtn.title = micOn ? 'Microphone ON — your voice will be recorded; click to turn off' : 'Record your microphone (voiceover) — click to turn on before recording';
    updateMicSelVisibility();
    try { if (pdr && pdr.capture && pdr.capture.recordMicToggle) pdr.capture.recordMicToggle({ enabled: micOn }); } catch (e) {}
  });
  micSel.addEventListener('change', function () {
    if (finished || !armed) return;
    micDeviceId = micSel.value || '';
    try { if (pdr && pdr.capture && pdr.capture.recordSetMic) pdr.capture.recordSetMic(micDeviceId); } catch (e) {}
  });
  // v3.0 round 411 — click-ripple toggle (works armed or recording; main owns the
  // overlay + the global hook). Persisted for future recordings.
  clicksBtn.addEventListener('click', function () {
    if (finished) return;
    rippleOn = !rippleOn;
    clicksBtn.classList.toggle('on', rippleOn);
    clicksBtn.title = rippleOn ? 'Click ripples are ON — a gold ring shows where you click; click to turn off' : 'Show a gold ripple wherever you click — helps viewers follow your cursor in tutorials';
    try { if (pdr && pdr.capture && pdr.capture.recordRippleToggle) pdr.capture.recordRippleToggle({ enabled: rippleOn }); } catch (e) {}
  });
  // v3.0 round 412 — Zoom moment (manual): click to zoom toward centre, click again to
  // zoom back out. Records the moment (recording-clock ms) for the save-time zoom.
  zoomBtn.addEventListener('click', function () {
    if (finished || !recorder) return;
    if (!zoomActive) {
      zoomActive = true;
      zoomBtn.classList.add('active');
      zoomBtn.title = 'Zoomed in — click to zoom back out';
      try { if (pdr && pdr.capture && pdr.capture.recordZoom) pdr.capture.recordZoom({ type: 'open', startMs: clockMs() }); } catch (e) {}
    } else {
      zoomActive = false;
      zoomBtn.classList.remove('active');
      zoomBtn.title = 'Zoom in on the action — click to zoom toward the center, click again to zoom back out';
      try { if (pdr && pdr.capture && pdr.capture.recordZoom) pdr.capture.recordZoom({ type: 'close', endMs: clockMs() }); } catch (e) {}
    }
  });
  // v3.0 round 485 — auto-zoom toward clicks toggle (works armed or recording, like
  // Clicks; main owns the click hook + opens zoom moments toward each click). Persisted
  // for future recordings via main's settings-store; also mirrored to localStorage so the
  // button can restore instantly even before the init payload lands.
  var LS_AUTOZOOM = 'pdr.capture.autoZoom';
  function applyAutoZoomBtn() {
    autoZoomBtn.classList.toggle('on', autoZoomOn);
    autoZoomBtn.title = autoZoomOn
      ? 'Auto-zoom is ON — each click eases the saved video in toward where you clicked; click to turn off'
      : 'Auto-zoom toward where you click — eases in on each click, eases back out when you pause. Applied to the saved video.';
  }

    if (finished) return;
    autoZoomOn = !autoZoomOn;
    applyAutoZoomBtn();
    try { localStorage.setItem(LS_AUTOZOOM, autoZoomOn ? '1' : '0'); } catch (e) {}
    try { if (pdr && pdr.capture && pdr.capture.setAutoZoom) pdr.capture.setAutoZoom(autoZoomOn); } catch (e) {}
  });

  // ── Round 130: Area pick (armed only). Main shows a live veil over
  // the screen as it now stands and opens the selector; Esc keeps the
  // previous area. Result comes back on record-do {action:'area-set'}.
  areaBtn.addEventListener('click', function () {
    if (finished || !armed) return;
    try { if (pdr && pdr.capture && pdr.capture.recordAreaRequest) pdr.capture.recordAreaRequest(); } catch (e) {}
  });

  // ── Round 131: Screen dropdown (armed only). Changing it re-homes
  // the recording to that display; main hands back the new source id
  // via record-do {action:'screen-set'} so Record captures it.
  screenSel.addEventListener('change', function () {
    if (finished || !armed) return;
    try { if (pdr && pdr.capture && pdr.capture.recordSetScreen) pdr.capture.recordSetScreen(screenSel.value); } catch (e) {}
  });

  // ── Round 127: Blur ──
  // Click while no blur is active: auto-pause (so the selection
  // overlay never appears in the footage), ask main to open the
  // area selector on the recorded screen. Main replies with
  // blur-opened + the area; we stamp the START time from the frozen
  // recording clock. Click again (Unblur): stamp the END. The saved
  // MP4 gets the blur applied between those two times.
  blurBtn.addEventListener('click', function () {
    if (finished || blurSelecting || !recorder) return;
    // v3.0 round 414 — Blur now ADDS a region every time (multiple allowed);
    // removal is via the Unblur button. Pause, then the area selector opens.
    blurSelecting = true;
    doPause();
    try { if (pdr && pdr.capture && pdr.capture.recordBlurRequest) pdr.capture.recordBlurRequest(); } catch (e) { blurSelecting = false; }
  });
  function updateBlurUI() {
    if (blurCount > 0) {
      blurBtn.textContent = 'Blur · ' + blurCount;
      blurBtn.classList.add('active');
      blurBtn.title = 'Add another blur area (' + blurCount + ' active). The saved video blurs each one.';
      unblurBtn.style.display = 'inline-block';
    } else {
      blurBtn.textContent = 'Blur';
      blurBtn.classList.remove('active');
      blurBtn.title = 'Blur an area — pause, then drag a box; the saved video blurs it. Add as many as you like.';
      unblurBtn.style.display = 'none';
    }
    try { requestResize(); } catch (e) {}
  }
  unblurBtn.addEventListener('click', function () {
    if (finished || blurCount <= 0) return;
    // Closes the last still-open region (main stamps its end here).

    blurCount = Math.max(0, blurCount - 1);

  });

  snapBtn.addEventListener('click', function () {
    if (finished) return;
    try { if (pdr && pdr.capture && pdr.capture.recordSnap) pdr.capture.recordSnap(); } catch (e) {}
  });
  pauseBtn.addEventListener('click', function () {
    if (!recorder || finished) return;
    if (paused) doResume(); else doPause();
  });
  // Round 129 — the user's moment of choice: until this click, the
  // engine is cold and nothing has been captured. Quality picked
  // while armed applies to the live capture bitrate here.
  recordBtn.addEventListener('click', function () {
    if (finished || recorder || !storedInit) return;
    storedInit.videoBitsPerSecond = QUALITY_BITRATE[quality] || storedInit.videoBitsPerSecond;
    enterRecordingUI();
    void start(storedInit);
  });
  // ── v3.1 (Terry) — SAVE/DISCARD double-check ("double-check that you're sure you want to save it…
  // to avoid a mis-click after a minute"). Stop (or ✕ mid-recording) PAUSES the take and swaps the bar
  // for the confirm strip: [Save recording] [Discard] [Keep recording]. Nothing extra is recorded while
  // you decide; Keep resumes exactly where you paused (unless you'd paused yourself — then it stays
  // paused). While merely ARMED (nothing recorded yet), ✕ still cancels instantly.
  var confirmEl = document.getElementById('confirm');
  var cfmLabel = document.getElementById('cfmLabel');
  var confirmWasPaused = false;
  var confirmKind = 'stop';   // v3.1 (Terry) — 'stop' (Save?) vs 'cancel' (the ✕ / Discard?) — decides what Discard does
  function openConfirm(kind) {
    if (finished || !recorder) return;
    confirmKind = kind;
    confirmWasPaused = paused;
    if (!paused) { try { doPause(); } catch (e) {} }
    cfmLabel.textContent = (kind === 'cancel') ? 'Discard this recording?' : 'Save this recording?';
    // v3.1 (Terry) — Discard's meaning depends on how we got here; reflect it in the tooltip.
    cfmDiscardBtn.title = (kind === 'cancel')
      ? 'Discard this recording and close the recorder — nothing is saved'
      : 'Throw this take away and stay ready to record again — nothing is saved';
    confirmEl.classList.add('show');
  }
  function closeConfirm() { confirmEl.classList.remove('show'); }
  document.getElementById('cfmSave').addEventListener('click', function () { closeConfirm(); finish(false); });
  // Discard from Stop ("Save this recording?") re-arms for another go; Discard from the ✕ ("Discard this
  // recording?") is a deliberate abort → close the recorder, as the ✕ implies.
  document.getElementById('cfmDiscard').addEventListener('click', function () {
    closeConfirm();
    if (confirmKind === 'cancel') finish(true); else discardRearm();
  });
  document.getElementById('cfmKeep').addEventListener('click', function () {
    closeConfirm();
    if (!confirmWasPaused) { try { doResume(); } catch (e) {} }   // you'd paused yourself → stay paused
  });
  stopBtn.addEventListener('click', function () {
    if (finished) return;
    if (recorder && recorder.state !== 'inactive') openConfirm('stop');
    else finish(false);
  });
  cancelBtn.addEventListener('click', function () {
    if (finished) return;
    if (recorder && recorder.state !== 'inactive') openConfirm('cancel');   // a real take → double-check
    else finish(true);                                                      // armed only → nothing to lose
  });

  // v3.0 round 413 (Terry) — PDR-style tooltips. The bar is its own tiny window
  // so a bubble can't overflow above the buttons; main shows a separate tooltip
  // window just above the hovered control. We read each control's existing
  // title, suppress the native tooltip (remove it while hovering, restore on
  // leave) and forward the text + the control's centre/top to main.
  (function () {
    if (!(pdr && pdr.capture && pdr.capture.recordTip)) return;
    var tipTimer = null, tipEl = null;
    function clearTip() {
      if (tipTimer) { clearTimeout(tipTimer); tipTimer = null; }
      if (tipEl) {
        if (tipEl._tipText != null && !tipEl.hasAttribute('title')) tipEl.setAttribute('title', tipEl._tipText);
        tipEl._tipText = null; tipEl = null;
      }
      try { pdr.capture.recordTip({ text: null }); } catch (e) {}
    }
    allButtons.forEach(function (el) {
      if (!el) return;
      // v3.0.2 (Terry 2026-07-12) — several buttons RE-SET their `title` dynamically
      // as recording state changes (cam-only, mic, pause, zoom, blur, the confirm
      // buttons…). If that fires WHILE the button is hovered — after mouseenter has
      // already stripped the title — the native OS tooltip reappears and can leak into
      // the footage (Terry caught "Cam only — hide the desktop…" showing native after
      // toggling cam-only). Watch the title attribute and re-strip anything set while
      // this button is the active/stripped one, keeping the PDR tooltip text current.
      try {
        var mo = new MutationObserver(function () {
          if (el !== tipEl) return;                  // only the currently-hovered (stripped) button
          var t = el.getAttribute('title');
          if (t == null || t === '') return;         // our own removeAttribute — ignore
          el._tipText = t;                           // remember the new text for restore-on-leave
          el.removeAttribute('title');               // re-strip so no native tooltip shows
          if (!tipTimer) {                            // PDR tooltip already visible → refresh its text
            try { var r = el.getBoundingClientRect(); pdr.capture.recordTip({ text: t, x: r.left + r.width / 2, y: r.top }); } catch (e) {}
          }
        });
        mo.observe(el, { attributes: true, attributeFilter: ['title'] });
      } catch (e) { /* MutationObserver unavailable — non-fatal */ }

        var text = el.getAttribute('title') || el.getAttribute('aria-label');
        if (!text) return;
        clearTip();
        tipEl = el;
        tipEl._tipText = el.getAttribute('title');
        if (tipEl._tipText != null) el.removeAttribute('title');   // suppress the native tooltip
        tipTimer = setTimeout(function () {
          tipTimer = null;
          var r = el.getBoundingClientRect();
          try { pdr.capture.recordTip({ text: text, x: r.left + r.width / 2, y: r.top }); } catch (e) {}
        }, 360);
      });
      el.addEventListener('mouseleave', clearTip);
      el.addEventListener('click', clearTip);
    });
  })();

  if (pdr && pdr.capture) {
    if (pdr.capture.onRecordInit) {
      pdr.capture.onRecordInit(function (init) {
        storedInit = init || {};
        if (storedInit.quality && QUALITY_LABEL[storedInit.quality]) {
          quality = storedInit.quality;
          qualitySel.value = quality;
        }
        // v3.0 round 410 — restore the saved mic preference + device, light the
        // Mic button if on, and populate the device dropdown.
        micOn = storedInit.mic === true;
        micDeviceId = storedInit.micDevice || '';
        micBtn.classList.toggle('on', micOn);
        micBtn.title = micOn ? 'Microphone ON — your voice will be recorded; click to turn off' : 'Record your microphone (voiceover) — click to turn on before recording';
        enumerateMics();
        // v3.0 round 411 — restore the click-ripple preference + light the button.
        // v3.0 round 488 (Terry) — Clicks pulled for v3.0 (global-hook lag); force it
        // OFF regardless of any stored preference so the now-hidden feature can never
        // re-activate the laggy hook. Returns in v3.1.
        rippleOn = false;
        clicksBtn.classList.toggle('on', rippleOn);
        clicksBtn.title = rippleOn ? 'Click ripples are ON — a gold ring shows where you click; click to turn off' : 'Show a gold ripple wherever you click — helps viewers follow your cursor in tutorials';
        // v3.0 round 485 — restore the auto-zoom preference. The init payload (main's
        // settings-store) is authoritative; fall back to the localStorage mirror if the
        // payload doesn't carry it. Light the button and push the resolved state to main
        // so its autoZoomEnabled matches what the bar shows on load.
        autoZoomOn = (typeof storedInit.autoZoom === 'boolean')
          ? storedInit.autoZoom
          : (function () { try { return localStorage.getItem(LS_AUTOZOOM) === '1'; } catch (e) { return false; } })();
        applyAutoZoomBtn();
        try { localStorage.setItem(LS_AUTOZOOM, autoZoomOn ? '1' : '0'); } catch (e) {}
        try { if (pdr && pdr.capture && pdr.capture.setAutoZoom) pdr.capture.setAutoZoom(autoZoomOn); } catch (e) {}
        // Round 131 — populate the Screen dropdown from the display
        // list (already sorted left→right with position labels).
        if (storedInit.screens && storedInit.screens.length) {
          screenSel.innerHTML = '';
          storedInit.screens.forEach(function (s) {
            var o = document.createElement('option');
            o.value = s.id;
            // Trim the "— 1920×1080" tail; the bar is tight.
            o.textContent = String(s.label).replace(/\s*—.*$/, '');
            screenSel.appendChild(o);
          });
          if (storedInit.currentScreenId) screenSel.value = storedInit.currentScreenId;
        }
        if (storedInit.armed) {
          enterArmedUI(storedInit.region || null);
        } else {
          // Legacy immediate-start path (not used since round 129).
          void start(storedInit);
        }
      });
    }
    if (pdr.capture.onRecordDo) {
      pdr.capture.onRecordDo(function (cmd) {
        if (!cmd) return;
        if (cmd.action === 'stop') finish(false);
        else if (cmd.action === 'cancel') finish(true);
        else if (cmd.action === 'area-set') {
          currentRegion = cmd.region || null;   // v3.1 (Terry) — remembered so a re-arm shows the same crop
          if (armed && !finished) {
            sizeEl.textContent = cmd.region ? 'Ready · ' + cmd.region.width + '×' + cmd.region.height : 'Ready';
            requestResize();
          }
        }
        else if (cmd.action === 'screen-set') {
          // Round 131 — the recorded screen changed; update the
          // engine inputs so Record captures the new display, and
          // reflect the reset-to-full-screen area.
          if (storedInit) {
            if (cmd.sourceId) storedInit.sourceId = cmd.sourceId;
            if (cmd.maxWidth) storedInit.maxWidth = cmd.maxWidth;
            if (cmd.maxHeight) storedInit.maxHeight = cmd.maxHeight;
          }
          if (cmd.screenId) screenSel.value = cmd.screenId;
          currentRegion = null;   // v3.1 (Terry) — new screen resets to full-frame
          if (armed && !finished) { sizeEl.textContent = 'Ready'; requestResize(); }
        }
        else if (cmd.action === 'cam-state') {
          camBtn.classList.toggle('active', !!cmd.visible);
          camBtn.title = cmd.visible ? 'Camera is in the recording — click to hide it' : 'Show or hide your camera bubble in the recording';
          // v3.1 (Terry) — second camera lights its own button. (Backdrop now lives on each bubble.)
          cam2Btn.classList.toggle('active', !!cmd.visible2);
          cam2Btn.title = cmd.visible2 ? 'Second camera is in the recording — click to hide it' : 'Show or hide a second camera bubble (your other camera) in the recording';
          // v3.1 (Terry 2026-07-11) — reflect the live "cam only" state: when it's ON, the button
          // becomes the way BACK to the screen, so the label + tip say so (short + suitable).
          if (camOnlyBtn) {
            camOnlyBtn.classList.toggle('active', !!cmd.camOnly);
            camOnlyBtn.textContent = cmd.camOnly ? 'Show screen' : 'Cam only';
            camOnlyBtn.setAttribute('title', cmd.camOnly ? 'Show screen — bring the desktop back into the recording (your camera returns to its spotlight)' : 'Cam only — hide the desktop and record just your camera(s). Click any time to switch back.');
          }
          requestResize();
        }
        else if (cmd.action === 'blur-opened') {
          // Main resolved the area selector. rect is in VIDEO pixels
          // (null = user cancelled the selection).
          blurSelecting = false;
          if (cmd.rect && !finished) {
            blurCount++;
            try { if (pdr && pdr.capture && pdr.capture.recordBlur) pdr.capture.recordBlur({ type: 'open', rect: cmd.rect, startMs: clockMs() }); } catch (e) {}
            updateBlurUI();
          }
          // Stay paused either way — the user resumes when ready, exactly the
          // pause → blur → resume flow Terry described. Click Blur again to add
          // another area; Unblur removes the last.
        }
      });
    }
  }
})();
</script>
</body>
</html>
