<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Create Collage — PDR</title>
<!--
  v2.1 round 138 (Terry 2026-06-12) — Collage composer.

  Opened from a multi-selection (Memories Dates/Albums/Needs Dates,
  S&D) via "Create Collage". Shows the chosen photos as draggable,
  removable tiles. The user reorders (drag), removes (×), jumbles
  (shuffle), and picks a column count + mat colour, then Create
  composites them (sharp, in main) into ONE image that opens in PDRV
  — where all the usual Looks / Frames / sliders apply.

  Self-contained vanilla HTML/JS (no React) — a standalone window,
  same pattern as the capture overlays.
-->
<style>
  :root { --accent: #a99cff; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #16161a; color: #ececf0; font: 14px/1.5 system-ui, 'Segoe UI', sans-serif; }
  body { display: flex; flex-direction: column; }
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  header h1 { font-size: 16px; font-weight: 600; margin: 0; flex: 0 0 auto; }
  header .spacer { flex: 1 1 auto; }
  .ctrl { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #b9b9c2; }
  select, .btn {
    background: rgba(255,255,255,0.06); color: #ececf0;
    border: 1px solid rgba(255,255,255,0.18); border-radius: 8px;
    height: 32px; padding: 0 12px; font: 500 12px/1 system-ui, sans-serif; cursor: pointer;
  }
  select:hover, .btn:hover { background: rgba(255,255,255,0.13); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #1b1630; font-weight: 600; padding: 0 18px; }
  .btn-primary:hover { filter: brightness(1.07); }
  .btn-primary:disabled { opacity: 0.5; cursor: default; }
  .swatches { display: flex; gap: 5px; }
  .sw { width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.25); cursor: pointer; padding: 0; }
  .sw.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(169,156,255,0.4); }
  #grid {
    flex: 1 1 auto; overflow-y: auto; padding: 18px;
    display: grid; gap: 10px; align-content: start;
  }
  .tile {
    position: relative; aspect-ratio: 1 / 1; border-radius: 10px; overflow: hidden;
    background: #23232a center/cover no-repeat; cursor: grab; border: 2px solid transparent;
  }
  .tile.dragging { opacity: 0.4; cursor: grabbing; }
  .tile.dragover { border-color: var(--accent); }
  .tile .num {
    position: absolute; top: 6px; left: 6px; min-width: 20px; height: 20px;
    background: rgba(0,0,0,0.6); border-radius: 10px; font-size: 11px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; padding: 0 6px;
  }
  .tile .rm {
    position: absolute; top: 6px; right: 6px; width: 22px; height: 22px;
    border-radius: 50%; border: none; background: rgba(0,0,0,0.6); color: #fff;
    cursor: pointer; font-size: 14px; line-height: 22px; padding: 0; display: flex; align-items: center; justify-content: center;
  }
  .tile .rm:hover { background: #e5484d; }
  footer { padding: 10px 18px; border-top: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 10px; }
  footer .hint { font-size: 12px; color: #8a8a93; flex: 1 1 auto; }
</style>
</head>
<body>
  <header>
    <h1>Create Collage</h1>
    <div class="ctrl">Columns
      <select id="cols">
        <option value="auto" selected>Auto</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
      </select>
    </div>
    <div class="ctrl">Mat
      <span class="swatches" id="swatches">
        <button class="sw active" data-bg="#ffffff" style="background:#ffffff" title="White"></button>
        <button class="sw" data-bg="#111111" style="background:#111111" title="Black"></button>
        <button class="sw" data-bg="#f5efe0" style="background:#f5efe0" title="Cream"></button>
        <button class="sw" data-bg="#1f2a44" style="background:#1f2a44" title="Navy"></button>
        <button class="sw" data-bg="#c8a24b" style="background:#c8a24b" title="Gold"></button>
      </span>
    </div>
    <div class="spacer"></div>
    <button class="btn" id="jumble">Jumble</button>
  </header>
  <div id="grid"></div>
  <footer>
    <span class="hint" id="hint">Drag to reorder · × to remove · then Create</span>
    <button class="btn" id="cancel">Cancel</button>
    <button class="btn btn-primary" id="create">Create collage</button>
  </footer>
<script>
(function () {
  var pdr = window.pdr;
  var grid = document.getElementById('grid');
  var colsSel = document.getElementById('cols');
  var jumbleBtn = document.getElementById('jumble');
  var createBtn = document.getElementById('create');
  var cancelBtn = document.getElementById('cancel');
  var hint = document.getElementById('hint');
  var swatches = document.getElementById('swatches');

  var items = [];      // { path, url }
  var bg = '#ffffff';
  var dragIndex = -1;

  function effectiveCols() {
    var v = colsSel.value;
    if (v === 'auto') {
      var n = items.length;
      if (n <= 1) return 1; if (n <= 4) return 2; if (n <= 9) return 3; if (n <= 16) return 4; return 5;
    }
    return parseInt(v, 10) || 3;
  }

  function render() {
    grid.style.gridTemplateColumns = 'repeat(' + effectiveCols() + ', 1fr)';
    grid.innerHTML = '';
    items.forEach(function (it, i) {
      var tile = document.createElement('div');
      tile.className = 'tile';
      tile.style.backgroundImage = 'url("' + it.url.replace(/"/g, '\\"') + '")';
      tile.setAttribute('draggable', 'true');
      tile.dataset.index = String(i);

      var num = document.createElement('div'); num.className = 'num'; num.textContent = String(i + 1);
      var rm = document.createElement('button'); rm.className = 'rm'; rm.textContent = '×'; rm.title = 'Remove';
      rm.addEventListener('click', function (e) { e.stopPropagation(); items.splice(i, 1); render(); updateState(); });
      tile.appendChild(num); tile.appendChild(rm);

      tile.addEventListener('dragstart', function () { dragIndex = i; tile.classList.add('dragging'); });
      tile.addEventListener('dragend', function () { dragIndex = -1; tile.classList.remove('dragging'); Array.prototype.forEach.call(grid.children, function (c) { c.classList.remove('dragover'); }); });
      tile.addEventListener('dragover', function (e) { e.preventDefault(); tile.classList.add('dragover'); });
      tile.addEventListener('dragleave', function () { tile.classList.remove('dragover'); });
      tile.addEventListener('drop', function (e) {
        e.preventDefault();
        tile.classList.remove('dragover');
        if (dragIndex < 0 || dragIndex === i) return;
        var moved = items.splice(dragIndex, 1)[0];
        items.splice(i, 0, moved);
        render(); updateState();
      });
      grid.appendChild(tile);
    });
  }

  function updateState() {
    var ok = items.length >= 2;
    createBtn.disabled = !ok;
    hint.textContent = items.length < 2
      ? 'Add at least two photos for a collage'
      : (items.length + ' photos · drag to reorder · × to remove');
  }

  function jumble() {
    for (var i = items.length - 1; i > 0; i--) {
      // Deterministic-enough shuffle (no Math.random restriction here —
      // this is renderer code, not a workflow script).
      var j = Math.floor(Math.random() * (i + 1));
      var t = items[i]; items[i] = items[j]; items[j] = t;
    }
    render(); updateState();
  }

  colsSel.addEventListener('change', render);
  jumbleBtn.addEventListener('click', jumble);
  swatches.addEventListener('click', function (e) {
    var b = e.target.closest ? e.target.closest('.sw') : null;
    if (!b) return;
    bg = b.getAttribute('data-bg') || '#ffffff';
    swatches.querySelectorAll('.sw').forEach(function (x) { x.classList.remove('active'); });
    b.classList.add('active');
  });
  cancelBtn.addEventListener('click', function () { try { window.close(); } catch (e) {} });

  createBtn.addEventListener('click', async function () {
    if (items.length < 2 || createBtn.disabled) return;
    createBtn.disabled = true;
    hint.textContent = 'Creating collage…';
    try {
      var cols = colsSel.value === 'auto' ? undefined : parseInt(colsSel.value, 10);
      var res = await pdr.collage.create({ filePaths: items.map(function (i) { return i.path; }), cols: cols, background: bg });
      if (res && res.success && res.filePath) {
        // Open the finished collage in PDRV for the usual enhancements.
        try { await pdr.search.openViewer([res.filePath], [res.filename || 'Collage']); } catch (e) {}
        try { pdr.collage.close(); } catch (e) { try { window.close(); } catch (e2) {} }
      } else {
        hint.textContent = (res && res.error) || 'Could not create the collage.';
        createBtn.disabled = false;
      }
    } catch (err) {
      hint.textContent = (err && err.message) || 'Could not create the collage.';
      createBtn.disabled = false;
    }
  });

  if (pdr && pdr.collage && pdr.collage.onInit) {
    pdr.collage.onInit(function (info) {
      items = (info && info.items) ? info.items.slice() : [];
      render(); updateState();
    });
  }
})();
</script>
</body>
</html>
