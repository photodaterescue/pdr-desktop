<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Camera backdrop</title>
<!--
  v3.1 (Terry) — CAMERA BACKDROP PICKER, its own window.

  The camera bubble is tiny, so the in-bubble swatch grid made the scene
  thumbnails unreadable. This is a separate, roomy, always-on-top window
  (content-protected, so it never lands in the recording) that opens from the
  bubble's Backdrop button and shows every backdrop at a proper size.

  v3.1 (Terry, round 2) — the four groups are now FILTER TABS along the top
  (Simple · Scenes · PDR Colours · Textures); the body shows only the selected
  group's backdrops beneath. Opens on the tab holding the current backdrop
  (or Scenes when nothing's set, so the big thumbnails greet you). Done button
  is now true PDR gold (#FEC242, near-black text).

  Clicking a backdrop applies it LIVE to that camera's bubble and stays open
  so you can try several; Done / Esc closes it. Choices route through main
  (capture:cam-picker-choose), which persists them + tells the bubble.

  Self-contained vanilla HTML/JS — OS chrome, not app UI.
-->
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #14131c; color: #fff;
    font: 400 13px/1.4 system-ui, 'Segoe UI', sans-serif; user-select: none; -webkit-user-select: none; overflow: hidden; }
  #wrap { display: flex; flex-direction: column; height: 100%; }
  #bar { -webkit-app-region: drag; display: flex; align-items: center; gap: 8px; padding: 11px 14px 10px;
    flex-shrink: 0; }
  #bar h1 { font-size: 14px; font-weight: 600; margin: 0; letter-spacing: 0.01em; }
  #bar .sub { font-size: 11.5px; color: rgba(255,255,255,0.5); }
  #bar .spacer { flex: 1; }
  /* True PDR gold (#FEC242 from the logo petal) — near-black text on top, never white. */
  #done { -webkit-app-region: no-drag; height: 28px; padding: 0 14px; border-radius: 8px; border: none;
    background: #FEC242; color: #1F1A08; font: 600 12px/1 system-ui; cursor: pointer; }
  #done:hover { background: #FFD166; }
  #done:active { background: #F0B02E; }
  /* Filter tabs. Active = PDR-gold text + gold underline; the body shows only that group. */
  #tabs { display: flex; gap: 2px; padding: 0 12px; border-bottom: 1px solid rgba(255,255,255,0.09);
    flex-shrink: 0; -webkit-app-region: no-drag; }
  .tab { -webkit-app-region: no-drag; appearance: none; background: none; border: none;
    color: rgba(255,255,255,0.5); font: 600 12px/1 system-ui, 'Segoe UI', sans-serif;
    padding: 11px 13px 10px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
    white-space: nowrap; letter-spacing: 0.01em; }
  .tab:hover { color: rgba(255,255,255,0.85); }
  .tab.on { color: #FEC242; border-bottom-color: #FEC242; }
  #body { flex: 1; overflow-y: auto; padding: 14px; }
  #body::-webkit-scrollbar { width: 9px; }
  #body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 4px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  /* Scene card: 16:9 thumbnail + label under it. */
  .card { -webkit-app-region: no-drag; cursor: pointer; border-radius: 9px; overflow: hidden;
    border: 2px solid transparent; background: #201f2b; padding: 0; text-align: left; color: #fff; }
  .card .thumb { width: 100%; aspect-ratio: 16/9; background-size: cover; background-position: center; display: block; }
  .card .cap { display: block; font-size: 11.5px; padding: 6px 8px 7px; color: rgba(255,255,255,0.82); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card:hover { border-color: rgba(254,194,66,0.7); }
  .card.sel { border-color: #FEC242; }
  /* Swatch tile (None/Blur/colour/texture/picture) — sized to match the scene cards. */
  .sw { -webkit-app-region: no-drag; cursor: pointer; aspect-ratio: 16/10; border-radius: 9px; overflow: hidden;
    border: 2px solid transparent; background: #201f2b; position: relative; color: #fff; padding: 0;
    display: flex; align-items: center; justify-content: center; }
  .sw:hover { border-color: rgba(254,194,66,0.7); }
  .sw.sel { border-color: #FEC242; }
  .sw .lbl { position: absolute; bottom: 5px; left: 0; right: 0; text-align: center; font-size: 10.5px; color: rgba(255,255,255,0.92); text-shadow: 0 1px 3px rgba(0,0,0,0.75); }
  .sw svg { width: 26px; height: 26px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; margin-bottom: 8px; }
</style>
</head>
<body>
  <div id="wrap">
    <div id="bar">
      <h1>Camera backdrop</h1>
      <span class="sub" id="camlabel"></span>
      <span class="spacer"></span>
      <button id="done" type="button">Done</button>
    </div>
    <div id="tabs"></div>
    <div id="body"></div>
  </div>
<script>
(function () {
  var pdr = window.pdr;
  var which = 1;
  var current = { type: 'none' };
  var activeTab = 'scenes';
  var tabsEl = document.getElementById('tabs');
  var body = document.getElementById('body');

  // Filter tabs, left → right (Terry's order).
  var TABS = [
    { id: 'simple', label: 'Simple' },
    { id: 'scenes', label: 'Scenes' },
    { id: 'colours', label: 'PDR Colours' },
    { id: 'textures', label: 'Textures' },
  ];
  // Catalog (mirrors the bubble's renderers). Scenes are the Pexels backdrops (thumb-<id>.jpg).
  var SCENES = [
    { id: 'office', label: 'Office' }, { id: 'coworking', label: 'Co-working' }, { id: 'study', label: 'Study' }, { id: 'studio', label: 'Studio flat' },
    { id: 'lounge-bright', label: 'Bright lounge' }, { id: 'lounge-neutral', label: 'Cosy lounge' }, { id: 'lounge-pastel', label: 'Pastel lounge' }, { id: 'lounge-plant', label: 'Plant lounge' }, { id: 'fireplace', label: 'Fireplace' },
    { id: 'loft', label: 'Loft' }, { id: 'minimal-white', label: 'Minimal white' }, { id: 'minimal-bright', label: 'Bright minimal' }, { id: 'neutral-wall', label: 'Neutral wall' },
    { id: 'reading-nook', label: 'Reading nook' }, { id: 'library', label: 'Library' }, { id: 'plants', label: 'Plants' },
  ];
  var GRADIENTS = { lavender: ['#A99CFF', '#4A3FB8'], gold: ['#FEC242', '#6E4E12'], studio: ['#2A2933', '#0E0E14'], navy: ['#3949AB', '#111C45'], fuchsia: ['#D946EF', '#47105A'], forest: ['#10B981', '#053B26'] };
  var GRAD_LABELS = { lavender: 'Lavender', gold: 'Gold', studio: 'Dark Studio', navy: 'Navy', fuchsia: 'Fuchsia', forest: 'Forest' };
  var TEXTURES = [
    { id: 'bokehWarm', label: 'Warm bokeh', sw: 'radial-gradient(circle at 32% 30%, #ffce78, #2a1e08)' },
    { id: 'bokehCool', label: 'Cool bokeh', sw: 'radial-gradient(circle at 32% 30%, #aab6ff, #141b33)' },
    { id: 'spotlight', label: 'Spotlight', sw: 'radial-gradient(circle at 50% 26%, #ffffff, #0c0c12)' },
    { id: 'mesh', label: 'Mesh', sw: 'linear-gradient(135deg, #A99CFF, #D946EF 55%, #FEC242)' },
  ];

  function keyOf(bg) {
    if (!bg || !bg.type || bg.type === 'none') return 'none';
    if (bg.type === 'blur') return 'blur';
    if (bg.type === 'gradient') return 'g:' + (bg.value || '');
    if (bg.type === 'texture') return 't:' + (bg.value || '');
    if (bg.type === 'scene') return 's:' + (bg.value || '');
    if (bg.type === 'image') return 'image';
    return 'none';
  }
  // Which tab holds a given backdrop. 'none' → Scenes so the big thumbnails greet you on open.
  function tabForBg(bg) {
    if (!bg || !bg.type || bg.type === 'none') return 'scenes';
    if (bg.type === 'blur' || bg.type === 'image') return 'simple';
    if (bg.type === 'scene') return 'scenes';
    if (bg.type === 'gradient') return 'colours';
    if (bg.type === 'texture') return 'textures';
    return 'scenes';
  }
  function choose(bg) {
    current = bg;
    try { if (pdr && pdr.capture && pdr.capture.camPickerChoose) pdr.capture.camPickerChoose({ which: which, bg: bg }); } catch (e) {}
    markSel();
  }
  function markSel() {
    var cur = keyOf(current);
    Array.prototype.forEach.call(body.querySelectorAll('[data-key]'), function (el) {
      el.classList.toggle('sel', el.getAttribute('data-key') === cur);
    });
  }

  function renderTabs() {
    var h = '';
    TABS.forEach(function (t) {
      h += '<button class="tab' + (t.id === activeTab ? ' on' : '') + '" data-tab="' + t.id + '">' + t.label + '</button>';
    });
    tabsEl.innerHTML = h;
    Array.prototype.forEach.call(tabsEl.querySelectorAll('[data-tab]'), function (el) {
      el.addEventListener('click', function () {
        var id = el.getAttribute('data-tab');
        if (id === activeTab) return;
        activeTab = id;
        renderTabs();
        renderBody();
      });
    });
  }

  function renderBody() {
    var h = '<div class="grid">';
    if (activeTab === 'simple') {
      h += '<button class="sw" data-key="none" data-act="none"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><line x1="6" y1="18" x2="18" y2="6"/></svg><span class="lbl">None</span></button>';
      h += '<button class="sw" data-key="blur" data-act="blur"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="7" opacity="0.5"/></svg><span class="lbl">Blur</span></button>';
      h += '<button class="sw" data-key="image" data-act="pick"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10" r="1.6"/><path d="M4 18l5-4 3 2 4-3 4 3"/></svg><span class="lbl">My picture</span></button>';
    } else if (activeTab === 'scenes') {
      SCENES.forEach(function (s) {
        h += '<button class="card" data-key="s:' + s.id + '" data-act="scene" data-val="' + s.id + '"><span class="thumb" style="background-image:url(cam-backdrops/thumb-' + s.id + '.jpg)"></span><span class="cap">' + s.label + '</span></button>';
      });
    } else if (activeTab === 'colours') {
      Object.keys(GRADIENTS).forEach(function (k) {
        var g = GRADIENTS[k];
        h += '<button class="sw" data-key="g:' + k + '" data-act="gradient" data-val="' + k + '" style="background:linear-gradient(135deg,' + g[0] + ',' + g[1] + ')"><span class="lbl">' + (GRAD_LABELS[k] || k) + '</span></button>';
      });
    } else if (activeTab === 'textures') {
      TEXTURES.forEach(function (tx) {
        h += '<button class="sw" data-key="t:' + tx.id + '" data-act="texture" data-val="' + tx.id + '" style="background:' + tx.sw + '"><span class="lbl">' + tx.label + '</span></button>';
      });
    }
    h += '</div>';
    body.innerHTML = h;
    Array.prototype.forEach.call(body.querySelectorAll('[data-act]'), function (el) {
      el.addEventListener('click', function () {
        var act = el.getAttribute('data-act'), val = el.getAttribute('data-val');
        if (act === 'none') choose({ type: 'none' });
        else if (act === 'blur') choose({ type: 'blur' });
        else if (act === 'scene') choose({ type: 'scene', value: val });
        else if (act === 'gradient') choose({ type: 'gradient', value: val });
        else if (act === 'texture') choose({ type: 'texture', value: val });
        else if (act === 'pick') { try { if (pdr && pdr.capture && pdr.capture.camPickerPick) pdr.capture.camPickerPick({ which: which }); } catch (e) {} }
      });
    });
    markSel();
  }

  function close() { try { if (pdr && pdr.capture && pdr.capture.camPickerClose) pdr.capture.camPickerClose(); } catch (e) {} }
  document.getElementById('done').addEventListener('click', close);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });

  function boot() {
    activeTab = tabForBg(current);
    document.getElementById('camlabel').textContent = 'Camera ' + which;
    renderTabs();
    renderBody();
  }

  if (pdr && pdr.capture && pdr.capture.onPickerInit) {
    pdr.capture.onPickerInit(function (info) {
      which = (info && info.which === 2) ? 2 : 1;
      current = (info && info.current) || { type: 'none' };
      boot();
    });
  }
  boot();
})();
</script>
</body>
</html>
