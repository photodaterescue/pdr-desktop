<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDR Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, "Segoe UI", "Inter", sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #12122a;
      border-bottom: 1px solid rgba(169, 156, 255, 0.15);
      -webkit-app-region: drag;
      flex-shrink: 0;
    }
    .toolbar-title {
      font-size: 13px;
      font-weight: 500;
      color: #ccc;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      margin-right: 12px;
    }
    .toolbar-actions {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }
    .toolbar-btn {
      padding: 4px 10px;
      border: 1px solid rgba(169, 156, 255, 0.25);
      border-radius: 8px;
      background: rgba(169, 156, 255, 0.08);
      color: #bbb;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toolbar-btn:hover {
      background: rgba(169, 156, 255, 0.18);
      color: #fff;
      border-color: rgba(169, 156, 255, 0.4);
    }
    .toolbar-btn[hidden] { display: none; }
    .toolbar-counter {
      font-size: 12px;
      color: #A99CFF;
      font-weight: 600;
      padding: 3px 10px;
      background: rgba(169, 156, 255, 0.1);
      border-radius: 8px;
      white-space: nowrap;
    }
    .viewer-container {
      flex: 1;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .viewer-container img {
      position: absolute;
      transform-origin: 0 0;
      cursor: grab;
    }
    .viewer-container img.dragging {
      cursor: grabbing;
    }
    .viewer-container video {
      max-width: 100%;
      max-height: 100%;
      background: #000;
      outline: none;
    }
    /* Navigation arrows overlaid on the viewer */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(169, 156, 255, 0.3);
      color: #ddd;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      opacity: 0;
    }
    .viewer-container:hover .nav-arrow { opacity: 1; }
    .nav-arrow:hover { background: rgba(169, 156, 255, 0.3); color: #fff; }
    .nav-arrow.left { left: 16px; }
    .nav-arrow.right { right: 16px; }
    .nav-arrow:disabled { opacity: 0.2 !important; cursor: default; }
    .info-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      background: #12122a;
      border-top: 1px solid rgba(169, 156, 255, 0.15);
      font-size: 11px;
      color: #888;
      flex-shrink: 0;
    }
    .zoom-level { font-weight: 500; color: #A99CFF; }
    .no-image {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 14px;
      gap: 10px;
      height: 100%;
      text-align: center;
      padding: 24px;
    }
    .no-image .action {
      margin-top: 8px;
      padding: 8px 18px;
      border: 1px solid rgba(169, 156, 255, 0.4);
      border-radius: 8px;
      background: rgba(169, 156, 255, 0.15);
      color: #cfc7ff;
      font-size: 13px;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .no-image .action:hover { background: rgba(169, 156, 255, 0.3); color: #fff; }
    .filmstrip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      background: #12122a;
      border-top: 1px solid rgba(169, 156, 255, 0.15);
      overflow-x: auto;
      flex-shrink: 0;
      min-height: 80px;
    }
    .filmstrip::-webkit-scrollbar { height: 4px; }
    .filmstrip::-webkit-scrollbar-thumb { background: rgba(169,156,255,0.3); border-radius: 2px; }
    .filmstrip .thumb {
      height: 60px;
      width: auto;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.6;
      transition: all 0.15s;
      flex-shrink: 0;
      display: block;
    }
    .filmstrip .thumb:hover { opacity: 0.9; border-color: rgba(169,156,255,0.4); }
    .filmstrip .thumb.active { opacity: 1; border-color: #A99CFF; }
    .filmstrip .video-thumb {
      position: relative;
      height: 60px;
      width: 80px;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.6;
      transition: all 0.15s;
      flex-shrink: 0;
      background: #222 center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .filmstrip .video-thumb:hover { opacity: 0.9; border-color: rgba(169,156,255,0.4); }
    .filmstrip .video-thumb.active { opacity: 1; border-color: #A99CFF; }
    .filmstrip .video-thumb::after {
      content: '';
      position: absolute;
      width: 0; height: 0;
      border-left: 10px solid rgba(255,255,255,0.85);
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      filter: drop-shadow(0 0 4px rgba(0,0,0,0.6));
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="toolbar-title" id="filename">PDR Viewer</span>
    <div class="toolbar-actions">
      <span class="toolbar-counter" id="counter" style="display:none"></span>
      <button class="toolbar-btn" id="btn-fit" title="Fit to window (F)">Fit</button>
      <button class="toolbar-btn" id="btn-100" title="Actual size (0)">100%</button>
      <button class="toolbar-btn" id="btn-zoomIn" title="Zoom in (+)">+</button>
      <button class="toolbar-btn" id="btn-zoomOut" title="Zoom out (-)">−</button>
      <button class="toolbar-btn" id="btn-openExternal" title="Open in system player" hidden>Open externally</button>
    </div>
  </div>
  <div class="viewer-container" id="container">
    <button class="nav-arrow left" id="btn-prev" title="Previous (←)">&#8249;</button>
    <button class="nav-arrow right" id="btn-next" title="Next (→)">&#8250;</button>
    <div class="no-image" id="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <circle cx="8.5" cy="8.5" r="1.5"></circle>
        <polyline points="21 15 16 10 5 21"></polyline>
      </svg>
      <span>No image loaded</span>
    </div>
  </div>
  <div id="filmstrip" class="filmstrip" style="display:none"></div>
  <div class="info-bar">
    <span id="dimensions"></span>
    <span class="zoom-level" id="zoomLabel">100%</span>
  </div>

  <script>
    const container = document.getElementById('container');
    const placeholder = document.getElementById('placeholder');
    const filenameEl = document.getElementById('filename');
    const dimensionsEl = document.getElementById('dimensions');
    const zoomLabelEl = document.getElementById('zoomLabel');
    const filmstripEl = document.getElementById('filmstrip');
    const counterEl = document.getElementById('counter');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const btnFit = document.getElementById('btn-fit');
    const btn100 = document.getElementById('btn-100');
    const btnZoomIn = document.getElementById('btn-zoomIn');
    const btnZoomOut = document.getElementById('btn-zoomOut');
    const btnOpenExternal = document.getElementById('btn-openExternal');

    const VIDEO_EXTS = new Set(['mp4','mov','m4v','avi','mkv','webm','wmv','flv','3gp','mpg','mpeg']);

    let mediaEl = null;       // either <img> or <video>
    let isVideo = false;
    let zoom = 1;
    let panX = 0, panY = 0;
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let panStartX = 0, panStartY = 0;
    let fitZoom = 1;

    // Multi-file support
    let files = [];
    let currentIndex = 0;

    // Parse file paths from URL params
    const params = new URLSearchParams(window.location.search);
    const filesParam = params.get('files');
    const legacyFile = params.get('file'); // backwards compat

    if (filesParam) {
      try { files = JSON.parse(filesParam); } catch { files = []; }
    } else if (legacyFile) {
      files = [legacyFile];
    }

    function getExt(filePath) {
      const m = filePath.match(/\.([^.\\/]+)$/);
      return m ? m[1].toLowerCase() : '';
    }
    function isVideoPath(filePath) { return VIDEO_EXTS.has(getExt(filePath)); }
    function getFileSrc(filePath) {
      // Put the path in a query param so Chromium's URL parser (which
      // treats pdr-file as 'standard' scheme) can't mangle the C: drive
      // letter when serialising the URL.
      return 'pdr-file://local/?f=' + encodeURIComponent(filePath.replace(/\\/g, '/'));
    }
    function getFileSrcFallback(filePath) {
      return 'file:///' + encodeURI(filePath.replace(/\\/g, '/'));
    }
    function getFilename(filePath) {
      return filePath.split(/[/\\]/).pop() || 'Viewer';
    }

    async function fetchVideoThumb(filePath) {
      try {
        if (!window.pdr || !window.pdr.browser) return null;
        const r = await window.pdr.browser.thumbnail(filePath, 160);
        if (r && r.success && r.dataUrl) return r.dataUrl;
      } catch {}
      return null;
    }

    function openInSystemPlayer(filePath) {
      if (!window.pdr || !window.pdr.openExternal) return;
      const encoded = encodeURI(filePath.replace(/\\/g, '/'));
      window.pdr.openExternal('file:///' + encoded);
    }

    function setImageControlsVisible(show) {
      btnFit.hidden = !show;
      btn100.hidden = !show;
      btnZoomIn.hidden = !show;
      btnZoomOut.hidden = !show;
      zoomLabelEl.style.visibility = show ? '' : 'hidden';
    }

    function showUnplayable(filePath) {
      placeholder.innerHTML = '';
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('width', '48'); svg.setAttribute('height', '48');
      svg.setAttribute('viewBox', '0 0 24 24'); svg.setAttribute('fill', 'none');
      svg.setAttribute('stroke', '#A99CFF'); svg.setAttribute('stroke-width', '1.5');
      svg.setAttribute('stroke-linecap', 'round'); svg.setAttribute('stroke-linejoin', 'round');
      svg.innerHTML = '<polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>';
      placeholder.appendChild(svg);
      const msg = document.createElement('span');
      msg.textContent = "This video format isn't supported by the built-in player.";
      placeholder.appendChild(msg);
      const hint = document.createElement('span');
      hint.style.color = '#666'; hint.style.fontSize = '11px';
      hint.textContent = getFilename(filePath);
      placeholder.appendChild(hint);
      const btn = document.createElement('button');
      btn.className = 'action';
      btn.textContent = 'Open in system player';
      btn.addEventListener('click', () => openInSystemPlayer(filePath));
      placeholder.appendChild(btn);
      placeholder.style.display = 'flex';
    }

    function loadMedia(index) {
      if (index < 0 || index >= files.length) return;
      currentIndex = index;
      const filePath = files[currentIndex];

      // Remove old media
      if (mediaEl) {
        try { if (isVideo) mediaEl.pause(); } catch {}
        mediaEl.remove();
        mediaEl = null;
      }
      // Remove any stray status/preparing panes from a previous async load
      container.querySelectorAll('.no-image:not(#placeholder)').forEach((n) => n.remove());
      placeholder.style.display = 'none';
      placeholder.innerHTML = '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg><span>No image loaded</span>';

      isVideo = isVideoPath(filePath);
      setImageControlsVisible(!isVideo);
      btnOpenExternal.hidden = !isVideo;

      if (isVideo) {
        // Show a transcoding status while we wait for ffmpeg (no-op for
        // natively-supported formats — prepare() returns immediately).
        const status = document.createElement('div');
        status.className = 'no-image';
        status.innerHTML = '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#A99CFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg><span>Preparing video…</span><span style="color:#666;font-size:11px">Older formats are transcoded on first play. Subsequent opens are instant.</span>';
        placeholder.style.display = 'none';
        container.appendChild(status);

        const prepareStarted = filePath;
        // Attach the video with TWO candidate URLs — the primary (usually the
        // transcoded MP4) and a file:// fallback of that SAME file. The old
        // code mistakenly fell back to file:// of the original .mpg, which
        // Chromium couldn't play either way.
        const useSrc = (primaryUrl, fallbackUrl, label) => {
          if (currentIndex < 0 || files[currentIndex] !== prepareStarted) return;
          status.remove();
          const video = document.createElement('video');
          video.controls = true;
          video.autoplay = false;
          video.preload = 'metadata';
          video.onloadedmetadata = () => {
            dimensionsEl.textContent = video.videoWidth + ' \u00d7 ' + video.videoHeight + ' px \u2022 ' + Math.round(video.duration) + 's';
            console.log('[video] loaded metadata for', label);
          };
          let retried = false;
          video.onerror = () => {
            const err = video.error;
            console.warn('[video] error loading', label, 'src=' + video.src, 'code=' + (err && err.code), 'message=' + (err && err.message));
            if (!retried && fallbackUrl) {
              retried = true;
              console.log('[video] retrying with fallback URL');
              video.src = fallbackUrl;
              return;
            }
            video.remove();
            mediaEl = null;
            showUnplayable(filePath);
          };
          video.src = primaryUrl;
          container.appendChild(video);
          mediaEl = video;
        };

        (async () => {
          try {
            if (window.pdr && window.pdr.video && window.pdr.video.prepare) {
              console.log('[video] calling prepare() for', filePath);
              const r = await window.pdr.video.prepare(filePath);
              console.log('[video] prepare returned:', JSON.stringify(r));
              if (r && r.success && r.playableUrl) {
                // If a cachePath is returned, use it as the file:// fallback;
                // otherwise fall back to file:// of whatever pdr-file:// URL we got.
                const fallback = r.cachePath
                  ? 'file:///' + encodeURI(r.cachePath.replace(/\\/g, '/'))
                  : null;
                useSrc(r.playableUrl, fallback, 'prepared');
                return;
              }
              console.warn('[video] prepare failed:', r && r.error);
            }
          } catch (e) {
            console.warn('[video] prepare threw:', e && e.message);
          }
          // Last-resort: raw URL. Most of the time this will fail for formats
          // that required prepare in the first place, so showUnplayable is the
          // likely outcome — but at least we try.
          useSrc(getFileSrc(filePath), getFileSrcFallback(filePath), 'raw');
        })();
      } else {
        const img = document.createElement('img');
        img.src = getFileSrc(filePath);
        img.onload = () => {
          dimensionsEl.textContent = img.naturalWidth + ' \u00d7 ' + img.naturalHeight + ' px';
          fitToWindow();
        };
        let retried = false;
        img.onerror = () => {
          if (!retried) {
            retried = true;
            img.src = getFileSrcFallback(filePath);
          } else {
            img.remove();
            mediaEl = null;
            placeholder.innerHTML = '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#c44" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg><span style="color:#c44">File not found</span><span style="color:#666;font-size:11px;max-width:80%;word-break:break-all;text-align:center">' + filePath + '</span>';
            placeholder.style.display = 'flex';
          }
        };
        container.appendChild(img);
        mediaEl = img;
      }

      const name = getFilename(filePath);
      filenameEl.textContent = name;
      document.title = name + ' \u2014 PDR Viewer';

      // Update counter
      if (files.length > 1) {
        counterEl.style.display = '';
        counterEl.textContent = (currentIndex + 1) + ' / ' + files.length;
      }

      // Update nav arrows
      btnPrev.disabled = currentIndex === 0;
      btnNext.disabled = currentIndex === files.length - 1;

      // Update filmstrip active state
      updateFilmstripActive();
    }

    function updateFilmstripActive() {
      const thumbs = filmstripEl.querySelectorAll('[data-idx]');
      thumbs.forEach((t) => {
        t.classList.toggle('active', parseInt(t.dataset.idx, 10) === currentIndex);
      });
      const active = filmstripEl.querySelector('.active');
      if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    // Build filmstrip for multi-file
    if (files.length > 1) {
      filmstripEl.style.display = 'flex';
      files.forEach((fp, idx) => {
        if (isVideoPath(fp)) {
          const div = document.createElement('div');
          div.className = 'video-thumb';
          div.title = getFilename(fp);
          div.dataset.idx = String(idx);
          div.addEventListener('click', () => loadMedia(idx));
          // Async: fetch the generated frame thumbnail via the IPC bridge
          fetchVideoThumb(fp).then((dataUrl) => {
            if (dataUrl) div.style.backgroundImage = 'url(' + dataUrl + ')';
          });
          filmstripEl.appendChild(div);
        } else {
          const thumb = document.createElement('img');
          thumb.className = 'thumb';
          thumb.src = getFileSrc(fp);
          thumb.onerror = () => { thumb.src = getFileSrcFallback(fp); };
          thumb.title = getFilename(fp);
          thumb.dataset.idx = String(idx);
          thumb.addEventListener('click', () => loadMedia(idx));
          filmstripEl.appendChild(thumb);
        }
      });
      btnPrev.style.display = 'flex';
      btnNext.style.display = 'flex';
    } else {
      btnPrev.style.display = 'none';
      btnNext.style.display = 'none';
    }

    if (files.length > 0) {
      loadMedia(0);
    }

    // Diagnostic: confirm preload attached + prepare() available
    console.log('[viewer] window.pdr =', !!window.pdr, '| video.prepare =', !!(window.pdr && window.pdr.video && window.pdr.video.prepare), '| files =', files.length);

    // Navigation
    btnPrev.addEventListener('click', (e) => { e.stopPropagation(); loadMedia(currentIndex - 1); });
    btnNext.addEventListener('click', (e) => { e.stopPropagation(); loadMedia(currentIndex + 1); });
    btnOpenExternal.addEventListener('click', () => {
      const fp = files[currentIndex];
      if (fp) openInSystemPlayer(fp);
    });

    function fitToWindow() {
      if (!mediaEl || isVideo) return;
      const cw = container.clientWidth;
      const ch = container.clientHeight;
      const iw = mediaEl.naturalWidth;
      const ih = mediaEl.naturalHeight;
      fitZoom = Math.min(cw / iw, ch / ih, 1);
      zoom = fitZoom;
      panX = (cw - iw * zoom) / 2;
      panY = (ch - ih * zoom) / 2;
      applyTransform();
    }

    function zoomTo(newZoom, centreX, centreY) {
      if (!mediaEl || isVideo) return;
      newZoom = Math.max(0.05, Math.min(newZoom, 20));
      const imgX = (centreX - panX) / zoom;
      const imgY = (centreY - panY) / zoom;
      zoom = newZoom;
      panX = centreX - imgX * zoom;
      panY = centreY - imgY * zoom;
      applyTransform();
    }

    function zoomToCenter(newZoom) {
      const cw = container.clientWidth;
      const ch = container.clientHeight;
      zoomTo(newZoom, cw / 2, ch / 2);
    }

    function applyTransform() {
      if (!mediaEl || isVideo) return;
      mediaEl.style.transform = 'translate(' + panX + 'px, ' + panY + 'px) scale(' + zoom + ')';
      zoomLabelEl.textContent = Math.round(zoom * 100) + '%';
    }

    function clampPan() {
      if (!mediaEl || isVideo) return;
      const cw = container.clientWidth;
      const ch = container.clientHeight;
      const iw = mediaEl.naturalWidth * zoom;
      const ih = mediaEl.naturalHeight * zoom;

      if (iw <= cw) { panX = (cw - iw) / 2; }
      else { panX = Math.min(0, Math.max(cw - iw, panX)); }
      if (ih <= ch) { panY = (ch - ih) / 2; }
      else { panY = Math.min(0, Math.max(ch - ih, panY)); }
      applyTransform();
    }

    btnFit.addEventListener('click', fitToWindow);
    btn100.addEventListener('click', () => zoomToCenter(1));
    btnZoomIn.addEventListener('click', () => zoomToCenter(zoom * 1.25));
    btnZoomOut.addEventListener('click', () => zoomToCenter(zoom / 1.25));

    // Mouse wheel zoom — images only
    container.addEventListener('wheel', (e) => {
      if (!mediaEl || isVideo) return;
      e.preventDefault();
      const rect = container.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;
      const factor = e.deltaY > 0 ? 0.92 : 1.08;
      zoomTo(zoom * factor, mouseX, mouseY);
    }, { passive: false });

    // Pan with mouse drag — images only
    container.addEventListener('mousedown', (e) => {
      if (!mediaEl || isVideo) return;
      if (e.target.classList.contains('nav-arrow')) return;
      isDragging = true;
      mediaEl.classList.add('dragging');
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      panStartX = panX;
      panStartY = panY;
      e.preventDefault();
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      panX = panStartX + (e.clientX - dragStartX);
      panY = panStartY + (e.clientY - dragStartY);
      applyTransform();
    });

    window.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        if (mediaEl) mediaEl.classList.remove('dragging');
        clampPan();
      }
    });

    window.addEventListener('resize', () => {
      if (!mediaEl || isVideo) return;
      if (zoom <= fitZoom + 0.01) fitToWindow();
    });

    // Keyboard shortcuts
    window.addEventListener('keydown', (e) => {
      if (isVideo && (e.key === ' ' || e.code === 'Space')) {
        // Let <video> handle its own space-toggle when focused, otherwise toggle ourselves
        if (document.activeElement !== mediaEl) {
          e.preventDefault();
          if (mediaEl.paused) mediaEl.play(); else mediaEl.pause();
        }
        return;
      }
      if (e.key === '+' || e.key === '=') zoomToCenter(zoom * 1.25);
      else if (e.key === '-') zoomToCenter(zoom / 1.25);
      else if (e.key === '0') zoomToCenter(1);
      else if (e.key === 'f' || e.key === 'F') fitToWindow();
      else if (e.key === 'ArrowLeft' && !isVideo) loadMedia(currentIndex - 1);
      else if (e.key === 'ArrowRight' && !isVideo) loadMedia(currentIndex + 1);
      else if (e.key === 'Escape') window.close();
    });
  </script>
</body>
</html>
