<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDR Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, "Segoe UI", "Inter", sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #12122a;
      border-bottom: 1px solid rgba(169, 156, 255, 0.15);
      -webkit-app-region: drag;
      flex-shrink: 0;
    }
    .toolbar-title {
      font-size: 13px;
      font-weight: 500;
      color: #ccc;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      margin-right: 12px;
    }
    .toolbar-actions {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }
    .toolbar-btn {
      padding: 4px 10px;
      border: 1px solid rgba(169, 156, 255, 0.25);
      border-radius: 8px;
      background: rgba(169, 156, 255, 0.08);
      color: #bbb;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toolbar-btn:hover {
      background: rgba(169, 156, 255, 0.18);
      color: #fff;
      border-color: rgba(169, 156, 255, 0.4);
    }
    .toolbar-btn[hidden] { display: none; }
    .speed-wrap { position: relative; -webkit-app-region: no-drag; }
    .speed-menu {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      background: rgba(18,18,42,0.96);
      border: 1px solid rgba(169,156,255,0.25);
      border-radius: 8px;
      padding: 4px 0;
      min-width: 80px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.4);
      z-index: 100;
    }
    .speed-menu button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 5px 12px;
      font-size: 12px;
      color: #ccc;
      background: transparent;
      border: none;
      cursor: pointer;
    }
    .speed-menu button:hover { background: rgba(169,156,255,0.12); color: #fff; }
    .speed-menu button.active { color: #A99CFF; background: rgba(169,156,255,0.08); }
    .toolbar-counter {
      font-size: 12px;
      color: #A99CFF;
      font-weight: 600;
      padding: 3px 10px;
      background: rgba(169, 156, 255, 0.1);
      border-radius: 8px;
      white-space: nowrap;
    }
    .viewer-container {
      /* Kept as a plain block container to match the pre-video-playback
         original. Absolute-positioned children (the <img>, nav arrows,
         and video wrapper) all position themselves via transform /
         top-left, so the container only needs position:relative +
         overflow:hidden. Adding display:flex here previously broke the
         image fit math because it changed how clientWidth/Height
         interacted with the absolutely-positioned media during layout. */
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .viewer-container img {
      position: absolute;
      transform-origin: 0 0;
      cursor: grab;
    }
    .viewer-container img.dragging {
      cursor: grabbing;
    }
    .viewer-container video {
      /* Centred via absolute positioning since the parent is no longer
         a flex container. max-width/height: 100% keeps the video scaled
         to fit the viewer without overflow. */
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 100%;
      max-height: 100%;
      background: #000;
      outline: none;
    }
    /* Navigation arrows overlaid on the viewer */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(169, 156, 255, 0.35);
      color: #eee;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s, background 0.15s, color 0.15s, transform 0.15s;
      /* Persistently visible (60%) when shown — was opacity:0 + hover-only,
         which left users unsure the arrows existed. Hovering the arrow
         itself bumps it to 100%. Hidden entirely via display:none in JS
         when there's only a single file (nothing to navigate to). */
      opacity: 0.6;
    }
    .viewer-container:hover .nav-arrow { opacity: 0.9; }
    .nav-arrow:hover { background: rgba(169, 156, 255, 0.35); color: #fff; opacity: 1; transform: translateY(-50%) scale(1.06); }
    .nav-arrow.left { left: 16px; }
    .nav-arrow.right { right: 16px; transition: right 220ms cubic-bezier(0.4, 0, 0.2, 1); }
    /* v2.0.15 (Terry 2026-06-06) — when the Enhance panel is open
       (280 px right-side slide-in), shift the next-photo arrow left
       so it sits just to the left of the panel instead of being
       hidden behind it. Terry's UX: navigate to next photo without
       having to close the panel first. */
    body.enhance-panel-open .nav-arrow.right { right: 296px; }
    .nav-arrow:disabled { opacity: 0.2 !important; cursor: default; }
    /* Cross-window Fix-in-progress chip — same amber pill PDR shows
       on every other window so users always know a Fix is running.
       Pinned top-center, pulses to draw attention. pointer-events:
       none so clicks pass through (this window can't interact with
       the fix). */
    .fix-chip {
      position: fixed;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 9999px;
      background: #f59e0b;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.01em;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
      box-shadow: 0 0 0 2px rgba(252, 211, 77, 0.4), 0 4px 14px rgba(0, 0, 0, 0.35);
      pointer-events: none;
      user-select: none;
      animation: fix-chip-pulse 1.5s ease-in-out infinite;
      white-space: nowrap;
    }
    .fix-chip.visible { display: inline-flex; }
    .fix-chip .spinner {
      width: 12px; height: 12px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: fix-chip-spin 0.9s linear infinite;
    }
    @keyframes fix-chip-pulse {
      0%, 100% { box-shadow: 0 0 0 2px rgba(252, 211, 77, 0.4), 0 4px 14px rgba(0, 0, 0, 0.35); transform: translateX(-50%) scale(1); }
      50% { box-shadow: 0 0 0 6px rgba(252, 211, 77, 0), 0 4px 14px rgba(0, 0, 0, 0.35); transform: translateX(-50%) scale(1.025); }
    }
    @keyframes fix-chip-spin {
      to { transform: rotate(360deg); }
    }
    .info-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      background: #12122a;
      border-top: 1px solid rgba(169, 156, 255, 0.15);
      font-size: 11px;
      color: #888;
      flex-shrink: 0;
    }
    .zoom-level { font-weight: 500; color: #A99CFF; }
    /* v2.0.13 — caption row. Sits between the photo container and
       the filmstrip so it's always visible when present without
       eating any of the photo's viewing space. Dark-theme typography
       mirrors the info-bar but with a subtle accent border at the
       left so the user can tell it's the photo's caption rather than
       a status line. Hidden when the photo has no caption. */
    .caption-bar {
      display: none;
      padding: 8px 16px;
      background: #12122a;
      border-top: 1px solid rgba(169, 156, 255, 0.15);
      border-left: 3px solid rgba(169, 156, 255, 0.55);
      color: #d4d0e8;
      font-size: 13px;
      line-height: 1.45;
      flex-shrink: 0;
      max-height: 30vh;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .caption-bar.has-caption { display: block; }
    .caption-bar .caption-label {
      display: inline-block;
      margin-right: 8px;
      color: #A99CFF;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      vertical-align: middle;
    }
    .caption-bar .caption-text { vertical-align: middle; }
    .no-image {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 14px;
      gap: 10px;
      height: 100%;
      text-align: center;
      padding: 24px;
    }
    .no-image .action {
      margin-top: 8px;
      padding: 8px 18px;
      border: 1px solid rgba(169, 156, 255, 0.4);
      border-radius: 8px;
      background: rgba(169, 156, 255, 0.15);
      color: #cfc7ff;
      font-size: 13px;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .no-image .action:hover { background: rgba(169, 156, 255, 0.3); color: #fff; }
    .filmstrip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      background: #12122a;
      border-top: 1px solid rgba(169, 156, 255, 0.15);
      overflow-x: auto;
      flex-shrink: 0;
      min-height: 80px;
    }
    /* Filmstrip scrollbar — thicker so it's easy to grab and drag
       (Terry 2026-05-19: "the slider in the viewer is quite
       difficult to grab because this height is so thin... make it
       double the height"). Doubled from 4px to 10px, with a slightly
       higher-opacity thumb and a hover state so the affordance is
       clearer. */
    .filmstrip::-webkit-scrollbar { height: 10px; }
    .filmstrip::-webkit-scrollbar-track { background: rgba(169,156,255,0.05); border-radius: 5px; }
    .filmstrip::-webkit-scrollbar-thumb { background: rgba(169,156,255,0.5); border-radius: 5px; min-width: 60px; }
    .filmstrip::-webkit-scrollbar-thumb:hover { background: rgba(169,156,255,0.75); }
    .filmstrip::-webkit-scrollbar-thumb:active { background: rgba(169,156,255,0.9); }
    .filmstrip .thumb {
      /* Fixed-size tile so the strip layout is stable from the very
         first paint — see piece 3 in v2.0.9's viewer hotfix. With
         the previous `width: auto` rule, an <img> with no src yet
         is rendered 0px wide; as each tile's thumbnail IPC resolved
         the tile inflated to its natural aspect ratio, pushing every
         later tile rightward and racing the smooth scroll-into-view
         that was trying to centre the active photo. End result was
         the scrollbar drifting all the way right. 80×60 with
         object-fit: cover matches the video-thumb rule below for
         visual consistency, lays out stably while the IntersectionObserver
         backfills thumbnails, and crops sensibly for both portrait
         and landscape source aspects. */
      width: 80px;
      height: 60px;
      object-fit: cover;
      background: #1a1a2e;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.6;
      transition: all 0.15s;
      flex-shrink: 0;
      display: block;
    }
    .filmstrip .thumb:hover { opacity: 0.9; border-color: rgba(169,156,255,0.4); }
    .filmstrip .thumb.active { opacity: 1; border-color: #A99CFF; }
    .filmstrip .video-thumb {
      position: relative;
      height: 60px;
      width: 80px;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.6;
      transition: all 0.15s;
      flex-shrink: 0;
      background: #222 center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .filmstrip .video-thumb:hover { opacity: 0.9; border-color: rgba(169,156,255,0.4); }
    .filmstrip .video-thumb.active { opacity: 1; border-color: #A99CFF; }
    .filmstrip .video-thumb::after {
      content: '';
      position: absolute;
      width: 0; height: 0;
      border-left: 10px solid rgba(255,255,255,0.85);
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      filter: drop-shadow(0 0 4px rgba(0,0,0,0.6));
    }
  </style>
</head>
<body>
  <!-- Cross-window Fix-in-progress chip — populated by JS at the
       bottom of this file via window.pdr.onFixProgress /
       onFixStateChanged. Same amber pill the rest of PDR shows. -->
  <div class="fix-chip" id="fix-chip" title="A Fix is in progress in PDR">
    <span class="spinner"></span>
    <span id="fix-chip-text">Fix · Working</span>
  </div>
  <!--
    v2.0.15 (Terry 2026-06-06) — Enhance side panel styles.
    Right-side dark sheet at toolbar-edge color, 280px wide, slides
    in from the right edge. Sliders use a single-track + thumb pattern
    matching the dark theme (slate track, lavender-ish thumb). The
    bipolar Temperature slider has its track gradient tinted from
    cool blue (left) to warm orange (right) so direction reads at a
    glance. Reset button bottom-right, subtle until hovered.
  -->
  <style>
    .enhance-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 280px;
      background: rgba(18, 18, 42, 0.96);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-left: 1px solid rgba(169, 156, 255, 0.2);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 220ms cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 90;
      pointer-events: none;
    }
    .enhance-panel.open {
      transform: translateX(0);
      pointer-events: auto;
    }
    .enhance-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 12px 18px;
      border-bottom: 1px solid rgba(169, 156, 255, 0.12);
    }
    .enhance-title {
      font-size: 14px;
      font-weight: 600;
      color: #e8e6ff;
      letter-spacing: 0.01em;
    }
    .enhance-close {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: #aaa;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      border-radius: 6px;
      transition: background 120ms, color 120ms;
    }
    .enhance-close:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }
    .enhance-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .enhance-control {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .enhance-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: #ccc;
    }
    .enhance-label-row label {
      cursor: pointer;
    }
    .enhance-val {
      color: #a99cff;
      font-variant-numeric: tabular-nums;
      font-weight: 500;
    }
    .enhance-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(169, 156, 255, 0.18);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    .enhance-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #a99cff;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #1a1a2e;
      box-shadow: 0 0 0 1px rgba(169, 156, 255, 0.6);
      transition: transform 80ms;
    }
    .enhance-slider::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }
    .enhance-slider-bipolar {
      background: linear-gradient(90deg, #4a8cff 0%, rgba(169, 156, 255, 0.18) 50%, #ff9c4a 100%);
    }
    .enhance-toggle {
      width: 16px;
      height: 16px;
      accent-color: #a99cff;
      cursor: pointer;
    }
    .enhance-footer {
      padding: 12px 18px 18px 18px;
      border-top: 1px solid rgba(169, 156, 255, 0.12);
      display: flex;
      justify-content: flex-end;
    }
    .enhance-reset-btn {
      padding: 6px 14px;
      border: 1px solid rgba(169, 156, 255, 0.3);
      background: transparent;
      color: #ccc;
      font-size: 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 120ms, color 120ms, border-color 120ms;
      align-self: flex-end;
    }
    .enhance-reset-btn:hover {
      background: rgba(169, 156, 255, 0.12);
      color: #fff;
      border-color: rgba(169, 156, 255, 0.5);
    }
    /* v2.0.15 (Terry 2026-06-06) — Save panel styles. */
    .enhance-footer {
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
    }
    .enhance-save-preview {
      font-size: 11px;
      color: #999;
      text-align: center;
      padding: 4px 8px;
      background: rgba(169, 156, 255, 0.06);
      border-radius: 4px;
    }
    .enhance-save-filename {
      color: #cfc8ff;
      font-family: ui-monospace, "Cascadia Mono", "SF Mono", Menlo, Monaco, monospace;
      font-size: 10.5px;
    }
    .enhance-save-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .enhance-save-btn {
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 120ms, color 120ms, border-color 120ms, opacity 120ms;
    }
    .enhance-save-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .enhance-save-primary {
      background: #a99cff;
      color: #1a1a2e;
      border: 1px solid #a99cff;
    }
    .enhance-save-primary:hover:not(:disabled) {
      background: #988bf2;
      border-color: #988bf2;
    }
    .enhance-save-secondary {
      background: transparent;
      color: #ccc;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }
    .enhance-save-secondary:hover:not(:disabled) {
      background: rgba(255, 90, 90, 0.1);
      color: #ff9090;
      border-color: rgba(255, 90, 90, 0.4);
    }
    .enhance-save-saving {
      opacity: 0.7;
      cursor: progress;
    }
    .enhance-save-success {
      font-size: 11px;
      text-align: center;
      padding: 6px 8px;
      border-radius: 4px;
      background: rgba(46, 204, 113, 0.12);
      color: #7fe2a3;
      border: 1px solid rgba(46, 204, 113, 0.3);
      animation: enhance-success-fade 4s forwards;
    }
    @keyframes enhance-success-fade {
      0%, 70% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>

  <div class="toolbar">
    <span class="toolbar-title" id="filename">PDR Viewer</span>
    <div class="toolbar-actions">
      <span class="toolbar-counter" id="counter" style="display:none"></span>
      <button class="toolbar-btn" id="btn-fit" title="Fit to window (F)">Fit</button>
      <button class="toolbar-btn" id="btn-100" title="Actual size (0)">100%</button>
      <button class="toolbar-btn" id="btn-zoomIn" title="Zoom in (+)">+</button>
      <button class="toolbar-btn" id="btn-zoomOut" title="Zoom out (-)">−</button>
      <button class="toolbar-btn" id="btn-rotateLeft" title="Rotate left 90° (R)">⟲</button>
      <button class="toolbar-btn" id="btn-rotateRight" title="Rotate right 90° (Shift+R)">⟳</button>
      <!-- v2.0.15 (Terry 2026-06-06) — Enhance panel opener. -->
      <button class="toolbar-btn" id="btn-enhance" title="Enhance (E)">Enhance</button>
      <button class="toolbar-btn" id="btn-slideshow" title="Start slideshow (Space)" hidden>▶</button>
      <div class="speed-wrap" id="slideshow-wrap" hidden>
        <button class="toolbar-btn" id="btn-slideshowInterval" title="Slideshow interval">5s</button>
        <div class="speed-menu" id="slideshow-menu" style="display:none"></div>
      </div>
      <div class="speed-wrap" id="speed-wrap" hidden>
        <button class="toolbar-btn" id="btn-speed" title="Playback speed (shift+, / shift+.)">1x</button>
        <div class="speed-menu" id="speed-menu" style="display:none"></div>
      </div>
      <button class="toolbar-btn" id="btn-openExternal" title="Open in system player" hidden>Open externally</button>
    </div>
  </div>
  <div class="viewer-container" id="container">
    <button class="nav-arrow left" id="btn-prev" title="Previous (←)">&#8249;</button>
    <button class="nav-arrow right" id="btn-next" title="Next (→)">&#8250;</button>
    <div class="no-image" id="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <circle cx="8.5" cy="8.5" r="1.5"></circle>
        <polyline points="21 15 16 10 5 21"></polyline>
      </svg>
      <span>No image loaded</span>
    </div>
  </div>
  <div id="filmstrip" class="filmstrip" style="display:none"></div>

  <!-- v2.0.15 (Terry 2026-06-06) — Enhance side panel. Right-side
       slide-in, 280px wide, dark theme matching the viewer chrome.
       CSS-filter-based real-time preview — no canvas, no GPU
       transcoding. Sliders drive a global filter string that's
       applied to the current image/video element and re-applied
       whenever the user navigates to a new photo. Reset button
       restores defaults. Closed by default — opens via the Enhance
       toolbar button or the E shortcut. -->
  <aside id="enhance-panel" class="enhance-panel" aria-hidden="true">
    <div class="enhance-header">
      <span class="enhance-title">Enhance</span>
      <button class="enhance-close" id="enhance-close" title="Close (E)">×</button>
    </div>
    <div class="enhance-body">
      <div class="enhance-control">
        <div class="enhance-label-row">
          <label for="slider-brightness">Brightness</label>
          <span class="enhance-val" id="val-brightness">100</span>
        </div>
        <input class="enhance-slider" id="slider-brightness" type="range" min="0" max="200" step="1" value="100">
      </div>
      <div class="enhance-control">
        <div class="enhance-label-row">
          <label for="slider-contrast">Contrast</label>
          <span class="enhance-val" id="val-contrast">100</span>
        </div>
        <input class="enhance-slider" id="slider-contrast" type="range" min="0" max="200" step="1" value="100">
      </div>
      <div class="enhance-control">
        <div class="enhance-label-row">
          <label for="slider-saturation">Saturation</label>
          <span class="enhance-val" id="val-saturation">100</span>
        </div>
        <input class="enhance-slider" id="slider-saturation" type="range" min="0" max="200" step="1" value="100">
      </div>
      <div class="enhance-control">
        <div class="enhance-label-row">
          <label for="slider-temperature">Temperature</label>
          <span class="enhance-val" id="val-temperature">0</span>
        </div>
        <input class="enhance-slider enhance-slider-bipolar" id="slider-temperature" type="range" min="-50" max="50" step="1" value="0" title="Negative = cooler, positive = warmer">
      </div>
      <div class="enhance-control">
        <div class="enhance-label-row">
          <label for="toggle-bw">Black &amp; White</label>
          <input type="checkbox" class="enhance-toggle" id="toggle-bw">
        </div>
      </div>
    </div>
    <div class="enhance-footer">
      <!-- v2.0.15 (Terry 2026-06-06) — Save panel. Three buttons:
           Save as new (default, non-destructive, creates <name>_E.jpg
           sibling), Replace original (destructive, confirmation), and
           Cancel (clears save UI without affecting current adjustments).
           Filename preview line above the buttons so the user is never
           surprised by the output name. Disabled until at least one
           filter is non-default. -->
      <div class="enhance-save-preview" id="enhance-save-preview" style="display:none">
        Saves to <span class="enhance-save-filename" id="enhance-save-filename">—</span>
      </div>
      <div class="enhance-save-actions">
        <button class="enhance-save-btn enhance-save-primary" id="enhance-save-new" disabled title="Save as a new file alongside the original (recommended)">Save as new file</button>
        <button class="enhance-save-btn enhance-save-secondary" id="enhance-save-replace" disabled title="Overwrite the original file — destructive, can't be undone from here">Replace original</button>
      </div>
      <!-- v2.0.15 — inline transient success message; fades after 4s. -->
      <div class="enhance-save-success" id="enhance-save-success" style="display:none"></div>
      <button class="enhance-reset-btn" id="enhance-reset">Reset all</button>
    </div>
  </aside>

  <div id="captionBar" class="caption-bar">
    <span class="caption-label">Caption</span>
    <span class="caption-text" id="captionText"></span>
  </div>
  <div class="info-bar">
    <span id="dimensions"></span>
    <span class="zoom-level" id="zoomLabel">100%</span>
  </div>

  <script>
    const container = document.getElementById('container');
    const placeholder = document.getElementById('placeholder');
    const filenameEl = document.getElementById('filename');
    const dimensionsEl = document.getElementById('dimensions');
    const zoomLabelEl = document.getElementById('zoomLabel');
    const filmstripEl = document.getElementById('filmstrip');
    const counterEl = document.getElementById('counter');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const btnFit = document.getElementById('btn-fit');
    const btn100 = document.getElementById('btn-100');
    const btnZoomIn = document.getElementById('btn-zoomIn');
    const btnZoomOut = document.getElementById('btn-zoomOut');
    const btnRotateLeft = document.getElementById('btn-rotateLeft');
    const btnRotateRight = document.getElementById('btn-rotateRight');
    const btnOpenExternal = document.getElementById('btn-openExternal');
    const speedWrap = document.getElementById('speed-wrap');
    const btnSpeed = document.getElementById('btn-speed');
    const speedMenu = document.getElementById('speed-menu');
    const btnSlideshow = document.getElementById('btn-slideshow');
    const slideshowWrap = document.getElementById('slideshow-wrap');
    const btnSlideshowInterval = document.getElementById('btn-slideshowInterval');
    const slideshowMenu = document.getElementById('slideshow-menu');

    const PLAYBACK_RATES = [0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2];
    let playbackRate = 1;

    function renderSpeedMenu() {
      speedMenu.innerHTML = '';
      PLAYBACK_RATES.forEach((r) => {
        const b = document.createElement('button');
        b.textContent = r === 1 ? 'Normal' : (r + 'x');
        if (Math.abs(r - playbackRate) < 0.001) b.classList.add('active');
        b.addEventListener('click', () => {
          playbackRate = r;
          btnSpeed.textContent = r === 1 ? '1x' : (r + 'x');
          if (mediaEl && isVideo) mediaEl.playbackRate = r;
          speedMenu.style.display = 'none';
          renderSpeedMenu();
        });
        speedMenu.appendChild(b);
      });
    }
    renderSpeedMenu();

    btnSpeed.addEventListener('click', (e) => {
      e.stopPropagation();
      speedMenu.style.display = speedMenu.style.display === 'none' ? 'block' : 'none';
    });
    document.addEventListener('click', (e) => {
      if (!speedWrap.contains(e.target)) speedMenu.style.display = 'none';
    });

    const VIDEO_EXTS = new Set(['mp4','mov','m4v','avi','mkv','webm','wmv','flv','3gp','mpg','mpeg']);

    let mediaEl = null;       // either <img> or <video>
    let isVideo = false;
    let zoom = 1;
    let panX = 0, panY = 0;
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let panStartX = 0, panStartY = 0;
    let fitZoom = 1;
    // User-applied rotation in degrees (0/90/180/270). Loaded from
    // PDR's index when an image opens, persisted back on every rotate
    // button click. Layered on top of EXIF auto-rotation (which the
    // <img> tag already honours), so this is purely the user's manual
    // override. Reset to 0 between media transitions and re-fetched.
    let userRotation = 0;
    // True once the user has explicitly zoomed (wheel / +/- / 100%).
    // Resets whenever a new image is loaded. While false, any layout change
    // to the viewer container re-runs fitToWindow so the photo always ends
    // up correctly sized and centred regardless of when the container
    // finishes laying out.
    let userHasZoomed = false;

    // Multi-file support
    let files = [];
    let currentIndex = 0;
    let startIndex = 0;

    // v2.0.14 — file list is now fetched via IPC from main process
    // state, not parsed from the URL. The previous URL-query approach
    // stalled the viewer open for ~60s on a year-drilldown click
    // (6,000+ file paths JSON-stringified into the URL → Chromium URL
    // parser + viewer's JSON.parse round trip were the bottleneck;
    // the disk read of the JPG itself was incidental). Legacy
    // ?file=... single-file URL form is still honoured for any
    // callers that still pass it.
    // Promise-chain rather than top-level await because this <script>
    // isn't a module — the initial loadMedia() call at the bottom of
    // the file awaits `filesReady` via .then() instead.
    const filesReady = (async () => {
      const params = new URLSearchParams(window.location.search);
      const legacyFile = params.get('file');
      if (legacyFile) {
        files = [legacyFile];
        return;
      }
      if (window.pdr && window.pdr.viewer && window.pdr.viewer.getPendingFileList) {
        try {
          const payload = await window.pdr.viewer.getPendingFileList();
          if (payload && Array.isArray(payload.files)) {
            files = payload.files;
            const parsed = payload.startIndex;
            if (typeof parsed === 'number' && parsed >= 0 && parsed < files.length) startIndex = parsed;
          }
        } catch (e) {
          console.warn('[viewer] getPendingFileList failed:', e && e.message ? e.message : e);
        }
      }
      // Re-clamp defensively now that files is populated.
      if (typeof startIndex !== 'number' || startIndex < 0 || startIndex >= files.length) {
        startIndex = 0;
      }
    })();

    function getExt(filePath) {
      const m = filePath.match(/\.([^.\\/]+)$/);
      return m ? m[1].toLowerCase() : '';
    }
    function isVideoPath(filePath) { return VIDEO_EXTS.has(getExt(filePath)); }
    function getFileSrc(filePath) {
      // Put the path in a query param so Chromium's URL parser (which
      // treats pdr-file as 'standard' scheme) can't mangle the C: drive
      // letter when serialising the URL.
      return 'pdr-file://local/?f=' + encodeURIComponent(filePath.replace(/\\/g, '/'));
    }
    function getFileSrcFallback(filePath) {
      return 'file:///' + encodeURI(filePath.replace(/\\/g, '/'));
    }
    function getFilename(filePath) {
      return filePath.split(/[/\\]/).pop() || 'Viewer';
    }

    // Single thumbnail fetcher used by both photo and video tiles in
    // the filmstrip. Routes through the same browser:thumbnail IPC
    // (and the same on-disk cache, keyed on filePath:size) that the
    // Memories grid, Search results, and Albums use. Practical
    // upshot: any photo the user has already seen elsewhere in PDR
    // lands in the strip instantly from cache; first-sight photos
    // generate a 160px sharp/ffmpeg thumb once and reuse it
    // everywhere thereafter. Previously the photo branch pointed
    // each tile at the raw full-resolution file via getFileSrc(),
    // which for buckets in the high hundreds (681 / 2,070 photos
    // observed in Memories — By Date) pegged the GPU into a driver
    // hang as Chromium decoded every multi-megabyte phone shot in
    // parallel.
    async function fetchThumb(filePath) {
      try {
        if (!window.pdr || !window.pdr.browser) return null;
        const r = await window.pdr.browser.thumbnail(filePath, 160);
        if (r && r.success && r.dataUrl) return r.dataUrl;
      } catch {}
      return null;
    }

    function openInSystemPlayer(filePath) {
      if (!window.pdr || !window.pdr.openExternal) return;
      const encoded = encodeURI(filePath.replace(/\\/g, '/'));
      window.pdr.openExternal('file:///' + encoded);
    }

    function setImageControlsVisible(show) {
      btnFit.hidden = !show;
      btn100.hidden = !show;
      btnZoomIn.hidden = !show;
      btnZoomOut.hidden = !show;
      btnRotateLeft.hidden = !show;
      btnRotateRight.hidden = !show;
      zoomLabelEl.style.visibility = show ? '' : 'hidden';
      speedWrap.hidden = show;
      // Slideshow only makes sense for images (auto-advance), and only
      // when we have more than one file in the queue. The interval
      // picker tracks the same visibility.
      const slideshowable = show && files.length > 1;
      btnSlideshow.hidden = !slideshowable;
      slideshowWrap.hidden = !slideshowable;
    }

    function showUnplayable(filePath) {
      placeholder.innerHTML = '';
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('width', '48'); svg.setAttribute('height', '48');
      svg.setAttribute('viewBox', '0 0 24 24'); svg.setAttribute('fill', 'none');
      svg.setAttribute('stroke', '#A99CFF'); svg.setAttribute('stroke-width', '1.5');
      svg.setAttribute('stroke-linecap', 'round'); svg.setAttribute('stroke-linejoin', 'round');
      svg.innerHTML = '<polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>';
      placeholder.appendChild(svg);
      const msg = document.createElement('span');
      msg.textContent = "This video format isn't supported by the built-in player.";
      placeholder.appendChild(msg);
      const hint = document.createElement('span');
      hint.style.color = '#666'; hint.style.fontSize = '11px';
      hint.textContent = getFilename(filePath);
      placeholder.appendChild(hint);
      const btn = document.createElement('button');
      btn.className = 'action';
      btn.textContent = 'Open in system player';
      btn.addEventListener('click', () => openInSystemPlayer(filePath));
      placeholder.appendChild(btn);
      placeholder.style.display = 'flex';
    }

    // v2.0.13 — caption row state. Fetched per file via IPC so the
    // viewer doesn't need the captions list passed up-front; any
    // surface that opens openSearchViewer just needs to pass paths.
    const captionBarEl = document.getElementById('captionBar');
    const captionTextEl = document.getElementById('captionText');
    let captionFetchToken = 0;
    function loadCaptionFor(filePath) {
      const token = ++captionFetchToken;
      try {
        if (!window.pdr || !window.pdr.captions || !window.pdr.captions.getByPath) {
          // Bridge not exposed (older preload) — hide row.
          captionBarEl.classList.remove('has-caption');
          captionTextEl.textContent = '';
          return;
        }
        window.pdr.captions.getByPath(filePath).then((res) => {
          // Stale response — user has already navigated to another photo.
          if (token !== captionFetchToken) return;
          const caption = res && res.success && typeof res.data === 'string' ? res.data : null;
          if (caption && caption.length > 0) {
            captionTextEl.textContent = caption;
            captionBarEl.classList.add('has-caption');
          } else {
            captionTextEl.textContent = '';
            captionBarEl.classList.remove('has-caption');
          }
        }).catch(() => {
          if (token !== captionFetchToken) return;
          captionBarEl.classList.remove('has-caption');
          captionTextEl.textContent = '';
        });
      } catch {
        captionBarEl.classList.remove('has-caption');
        captionTextEl.textContent = '';
      }
    }

    function loadMedia(index) {
      if (index < 0 || index >= files.length) return;
      currentIndex = index;
      const filePath = files[currentIndex];
      // Tell other windows (e.g. People Manager's FaceGridModal) where
      // we are now, so their selection ring can follow the viewer
      // arrows without the user having to come back to PM and re-pick.
      try { window.pdr?.search?.notifyViewerIndex?.(currentIndex, filePath); } catch {}
      // Fetch the caption for this photo in parallel with media load.
      loadCaptionFor(filePath);

      // Remove old media
      if (mediaEl) {
        try { if (isVideo) mediaEl.pause(); } catch {}
        mediaEl.remove();
        mediaEl = null;
      }
      // Remove any stray status/preparing panes from a previous async load
      container.querySelectorAll('.no-image:not(#placeholder)').forEach((n) => n.remove());

      // Fresh file → fresh fit state. Any zoom the user applied to the
      // previous photo is forgotten here, so the new photo always opens
      // correctly fitted + centred.
      userHasZoomed = false;
      zoom = 1;
      panX = 0;
      panY = 0;
      fitZoom = 1;
      // Reset rotation; a real value is fetched from PDR's index once
      // the image binds (see the img.onload handler below). Defaults
      // to 0 if the file isn't indexed.
      userRotation = 0;
      placeholder.style.display = 'none';
      placeholder.innerHTML = '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg><span>No image loaded</span>';

      isVideo = isVideoPath(filePath);
      setImageControlsVisible(!isVideo);
      btnOpenExternal.hidden = !isVideo;

      if (isVideo) {
        // Show a transcoding status while we wait for ffmpeg (no-op for
        // natively-supported formats — prepare() returns immediately).
        const status = document.createElement('div');
        status.className = 'no-image';
        status.innerHTML = '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#A99CFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg><span>Preparing video…</span><span style="color:#666;font-size:11px">Older formats are transcoded on first play. Subsequent opens are instant.</span>';
        placeholder.style.display = 'none';
        container.appendChild(status);

        const prepareStarted = filePath;
        // Attach the video with TWO candidate URLs — the primary (usually the
        // transcoded MP4) and a file:// fallback of that SAME file. The old
        // code mistakenly fell back to file:// of the original .mpg, which
        // Chromium couldn't play either way.
        const useSrc = (primaryUrl, fallbackUrl, label) => {
          if (currentIndex < 0 || files[currentIndex] !== prepareStarted) return;
          status.remove();
          const video = document.createElement('video');
          video.controls = true;
          video.autoplay = false;
          video.preload = 'metadata';
          video.onloadedmetadata = () => {
            dimensionsEl.textContent = video.videoWidth + ' \u00d7 ' + video.videoHeight + ' px \u2022 ' + Math.round(video.duration) + 's';
            video.playbackRate = playbackRate;
            console.log('[video] loaded metadata for', label);
          };
          let retried = false;
          video.onerror = () => {
            const err = video.error;
            console.warn('[video] error loading', label, 'src=' + video.src, 'code=' + (err && err.code), 'message=' + (err && err.message));
            if (!retried && fallbackUrl) {
              retried = true;
              console.log('[video] retrying with fallback URL');
              video.src = fallbackUrl;
              return;
            }
            video.remove();
            mediaEl = null;
            showUnplayable(filePath);
          };
          video.src = primaryUrl;
          container.appendChild(video);
          mediaEl = video;
        };

        (async () => {
          try {
            if (window.pdr && window.pdr.video && window.pdr.video.prepare) {
              console.log('[video] calling prepare() for', filePath);
              const r = await window.pdr.video.prepare(filePath);
              console.log('[video] prepare returned:', JSON.stringify(r));
              if (r && r.success && r.playableUrl) {
                // If a cachePath is returned, use it as the file:// fallback;
                // otherwise fall back to file:// of whatever pdr-file:// URL we got.
                const fallback = r.cachePath
                  ? 'file:///' + encodeURI(r.cachePath.replace(/\\/g, '/'))
                  : null;
                useSrc(r.playableUrl, fallback, 'prepared');
                return;
              }
              console.warn('[video] prepare failed:', r && r.error);
            }
          } catch (e) {
            console.warn('[video] prepare threw:', e && e.message);
          }
          // Last-resort: raw URL. Most of the time this will fail for formats
          // that required prepare in the first place, so showUnplayable is the
          // likely outcome — but at least we try.
          useSrc(getFileSrc(filePath), getFileSrcFallback(filePath), 'raw');
        })();
      } else {
        const img = document.createElement('img');
        // Keep the image invisible until the first fit-to-window pass
        // has applied a transform. Otherwise the browser shows the
        // freshly-arrived bytes at their natural pixel size \u2014 for a
        // 3464\u00d74618 phone photo on a 1000-wide viewer that looks like
        // a deeply-zoomed crop of the top-left corner until onload
        // fires and the fit math reduces the scale (caught visibly
        // on slow loads where the gap stretches to seconds; Terry
        // saw "1000% zoom" on every Memories \u2014 By Date open).
        // Visibility (not display:none) is used so the image still
        // lays out and naturalWidth/Height are populated for the
        // fit calc; the reveal happens on the next frame after
        // applyTransform runs.
        img.style.visibility = 'hidden';
        img.src = getFileSrc(filePath);
        img.onload = () => {
          dimensionsEl.textContent = img.naturalWidth + ' \u00d7 ' + img.naturalHeight + ' px';
          // Pull the saved rotation for this file BEFORE the first fit
          // so the fit math accounts for the rotated bounding box (a
          // 90\u00b0/270\u00b0 image's natural aspect is swapped). Falls back to
          // 0 silently if the IPC isn't available or the file isn't
          // in the index yet.
          (async () => {
            try {
              if (window.pdr && window.pdr.viewer && window.pdr.viewer.getRotation) {
                const r = await window.pdr.viewer.getRotation(filePath);
                if (r && r.success) userRotation = ((r.rotation || 0) % 360 + 360) % 360;
              }
            } catch {}
            fitToWindow();
            requestAnimationFrame(fitToWindow);
            // Reveal AFTER applyTransform has set the CSS scale.
            // requestAnimationFrame ensures the browser has actually
            // painted the transformed frame before we drop the
            // hidden visibility \u2014 no "natural-size flash" possible.
            requestAnimationFrame(() => { img.style.visibility = 'visible'; });
          })();
        };
        let retried = false;
        img.onerror = () => {
          if (!retried) {
            retried = true;
            img.src = getFileSrcFallback(filePath);
          } else {
            img.remove();
            mediaEl = null;
            placeholder.innerHTML = '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#c44" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg><span style="color:#c44">File not found</span><span style="color:#666;font-size:11px;max-width:80%;word-break:break-all;text-align:center">' + filePath + '</span>';
            placeholder.style.display = 'flex';
          }
        };
        container.appendChild(img);
        mediaEl = img;
      }

      const name = getFilename(filePath);
      filenameEl.textContent = name;
      document.title = name + ' \u2014 PDR Viewer';

      // Update counter
      if (files.length > 1) {
        counterEl.style.display = '';
        counterEl.textContent = (currentIndex + 1) + ' / ' + files.length;
      }

      // Update nav arrows
      btnPrev.disabled = currentIndex === 0;
      btnNext.disabled = currentIndex === files.length - 1;

      // Update filmstrip active state
      updateFilmstripActive();
    }

    function updateFilmstripActive() {
      const thumbs = filmstripEl.querySelectorAll('[data-idx]');
      thumbs.forEach((t) => {
        t.classList.toggle('active', parseInt(t.dataset.idx, 10) === currentIndex);
      });
      const active = filmstripEl.querySelector('.active');
      // Use behavior: 'auto' (instant snap) rather than 'smooth'. The
      // smooth-animated scroll was racing the asynchronous tile-width
      // resolution: by the time the animation reached its computed
      // target, the strip's layout had shifted under it (later tiles
      // arriving and pushing the active one rightward) so the
      // scrollbar parked itself far right with the active tile
      // off-screen. Now that .thumb has a fixed 80px width the layout
      // is stable from frame one, but instant scroll is still the
      // right behaviour here — there's no information conveyed by
      // animating the strip when the viewer first opens.
      if (active) active.scrollIntoView({ behavior: 'auto', block: 'nearest', inline: 'center' });
    }

    // v2.0.14 — wait for the IPC-fetched file list before building the
    // filmstrip or loading the first media. Promise-chain (not await)
    // because this script isn't a module. Everything inside this .then
    // depends on `files` and `startIndex` being populated; everything
    // outside (event listeners further down) reads them lazily on click,
    // so it's safe to leave outside the chain.
    filesReady.then(() => {
    // v2.0.14 (Terry 2026-05-28) — order changed so the main image
    // PAINTS first, then the filmstrip builds. Previously the
    // filmstrip's synchronous forEach over 6,000+ entries blocked
    // the JS event loop for ~15-18 s, so the image fetch (already
    // kicked off by pdr-file://) couldn't paint until the loop
    // finished. Two changes: (1) loadMedia first; (2) filmstrip
    // build is chunked into 200-element batches with setTimeout
    // yields between, so the browser gets a paint cycle every chunk.
    // First paint of the image happens during the first yield.
    if (files.length > 0) {
      loadMedia(startIndex);
    }

    if (files.length > 1) {
      filmstripEl.style.display = 'flex';

      // Vertical mouse-wheel input scrolls the strip horizontally —
      // same pattern PM's face-thumb strip uses (see PeopleManager.tsx
      // thumbStripRef wheel handler). Without this the user has to
      // either drag the scrollbar or shift-scroll, neither of which
      // is discoverable. Only intercept when the strip actually has
      // horizontal overflow so we don't swallow wheel events on a
      // strip narrower than the viewport.
      filmstripEl.addEventListener('wheel', (e) => {
        const hasOverflow = filmstripEl.scrollWidth > filmstripEl.clientWidth;
        if (e.deltaY !== 0 && hasOverflow) {
          filmstripEl.scrollLeft += e.deltaY;
          e.preventDefault();
          e.stopPropagation();
        }
      }, { passive: false });

      // Lazy-load thumbnails as tiles scroll into view rather than
      // firing 681 IPC round-trips the moment the viewer opens.
      // Without this, opening a Memories — By Date month bucket
      // floods the browser:thumbnail handler with hundreds of
      // simultaneous sharp/ffmpeg decodes (even cache hits cost a
      // file read + base64 encode round-trip each), making the
      // strip's behaviour feel chaotic — tiles pop in over several
      // seconds in roughly random order. The IntersectionObserver
      // restricts work to the ~20 tiles visible right now plus a
      // 400px lead margin in each direction, so scrolling stays
      // smooth and the first paint shows the right neighbourhood
      // of the active photo first.
      const lazyObserver = new IntersectionObserver((entries) => {
        for (const entry of entries) {
          if (!entry.isIntersecting) continue;
          const tile = entry.target;
          if (tile.dataset.loaded === '1') continue;
          tile.dataset.loaded = '1';
          const fp = tile.dataset.fp;
          if (!fp) continue;
          fetchThumb(fp).then((dataUrl) => {
            if (!dataUrl) return;
            if (tile.tagName === 'IMG') {
              tile.src = dataUrl;
            } else {
              tile.style.backgroundImage = 'url(' + dataUrl + ')';
            }
          });
          // Single-shot: once we've kicked off the fetch we don't
          // need further intersection events for this tile.
          lazyObserver.unobserve(tile);
        }
      }, { root: filmstripEl, rootMargin: '400px 0px' });

      // v2.0.14 — chunked build so the JS loop yields between batches
      // and the browser can paint the main image (and the filmstrip's
      // first row of tiles) before the rest of the strip materialises.
      // 200 entries per chunk × ~50 µs each = ~10 ms of blocked JS
      // per chunk; the setTimeout yield gives Chromium its paint slot.
      // A 6,785-entry strip builds in ~34 chunks ≈ 1-2 s total wall
      // clock, but the user sees the image + first chunk of tiles
      // within the first paint cycle (~100 ms).
      // v2.0.15 (Terry 2026-06-01) — transparent placeholder src.

        state.contrast = parseInt(sContrast.value, 10) || 100;
        vContrast.textContent = String(state.contrast);
        applyEnhanceFilter();
      });
      sSat.addEventListener('input', function () {
        state.saturation = parseInt(sSat.value, 10) || 100;
        vSat.textContent = String(state.saturation);
        applyEnhanceFilter();
      });
      sTemp.addEventListener('input', function () {
        state.temperature = parseInt(sTemp.value, 10) || 0;
        vTemp.textContent = (state.temperature > 0 ? '+' : '') + String(state.temperature);
        applyEnhanceFilter();
      });
      tBW.addEventListener('change', function () {
        state.bw = !!tBW.checked;
        applyEnhanceFilter();
      });
      resetBtn.addEventListener('click', resetState);

      // v2.0.15 (Terry 2026-06-06) — double-click any individual slider
      // to reset just that slider to its default (mid-point for the
      // bipolar Temperature, 100% for the others). Standard photo-
      // editor convention; users expect this and the Reset button at
      // the bottom only resets EVERYTHING.
      function attachDblClickReset(el, defaultVal, prop, valSpan, fmt) {
        el.addEventListener('dblclick', function (e) {
          e.preventDefault();
          state[prop] = defaultVal;
          el.value = String(defaultVal);
          if (valSpan) valSpan.textContent = fmt ? fmt(defaultVal) : String(defaultVal);
          applyEnhanceFilter();
        });
      }
      attachDblClickReset(sBright, 100, 'brightness', vBright);
      attachDblClickReset(sContrast, 100, 'contrast', vContrast);
      attachDblClickReset(sSat, 100, 'saturation', vSat);
      attachDblClickReset(sTemp, 0, 'temperature', vTemp, function (v) {
        return (v > 0 ? '+' : '') + String(v);
      });

      function openPanel() {
        panel.classList.add('open');
        panel.setAttribute('aria-hidden', 'false');
        // v2.0.15 — body class lets the next-photo arrow CSS shift
        // left of the panel so it stays clickable.
        document.body.classList.add('enhance-panel-open');
      }
      function closePanel() {
        panel.classList.remove('open');
        panel.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('enhance-panel-open');
      }
      openBtn.addEventListener('click', function () {
        if (panel.classList.contains('open')) closePanel(); else openPanel();
      });
      closeBtn.addEventListener('click', closePanel);

      // E shortcut toggles the panel.
      window.addEventListener('keydown', function (e) {
        if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
        if (e.key === 'e' || e.key === 'E') {
          e.preventDefault();
          if (panel.classList.contains('open')) closePanel(); else openPanel();
        }
      });

      // When the viewer swaps to a new image/video, re-apply the
      // current filter so it carries across navigation. We use a
      // MutationObserver on the container — fires whenever children
      // change (image swap, video swap). Cheap.
      const containerEl = document.getElementById('container');
      if (containerEl && typeof MutationObserver !== 'undefined') {
        const mo = new MutationObserver(function () {
          // Apply on next frame so the new <img> has its src set first.
          requestAnimationFrame(applyEnhanceFilter);
        });
        mo.observe(containerEl, { childList: true, subtree: true });
      }

      // v2.0.15 (Terry 2026-06-06) — Save panel wiring.
      // Three buttons: Save as new (default), Replace original
      // (destructive, confirms first), Reset all (already wired above).
      // Filename preview line shows the user-visible new filename for
      // 'new' mode before they click. Buttons are disabled when all
      // sliders are at defaults — nothing to save.
      const saveNewBtn = document.getElementById('enhance-save-new');
      const saveReplaceBtn = document.getElementById('enhance-save-replace');
      const savePreview = document.getElementById('enhance-save-preview');
      const savePreviewFilename = document.getElementById('enhance-save-filename');

      // v2.0.15 Phase 3c (Terry 2026-06-06) — Settings → AI → Photo
      // Enhancement lets the user pick which save action is the default.
      // We don't swap primary/secondary CSS classes (would lose the
      // destructive-red hover cue on Replace), instead we suffix the
      // chosen button's label with "(default)" so a mouse user can see
      // their preference at a glance. Default value if settings haven't
      // loaded yet is 'new' — matches the safe-default rule.
      let currentEnhanceSaveDefault = 'new';
      function refreshSaveDefaultLabels() {
        if (saveNewBtn) {
          saveNewBtn.textContent = currentEnhanceSaveDefault === 'new'
            ? 'Save as new file (default)'
            : 'Save as new file';
        }
        if (saveReplaceBtn) {
          saveReplaceBtn.textContent = currentEnhanceSaveDefault === 'replace'
            ? 'Replace original (default)'
            : 'Replace original';
        }
      }
      try {
        if (window.pdr && window.pdr.settings && window.pdr.settings.get) {
          window.pdr.settings.get().then(function (s) {
            if (s && (s.viewerEnhanceSaveDefault === 'new' || s.viewerEnhanceSaveDefault === 'replace')) {
              currentEnhanceSaveDefault = s.viewerEnhanceSaveDefault;
              refreshSaveDefaultLabels();
            }
          }).catch(function () { /* fall through with 'new' */ });
        }
      } catch (_) { /* preload missing — keep 'new' default */ }
      refreshSaveDefaultLabels();

      function isFilterModified() {
        return state.brightness !== 100 ||
               state.contrast !== 100 ||
               state.saturation !== 100 ||
               state.temperature !== 0 ||
               state.bw === true;
      }
      function deriveEnhancedFilename(filePath) {
        // Mirror main.ts logic: <basename>_E.jpg next to original.
        // Doesn't check for collisions client-side — main may pick
        // _E_2.jpg if _E.jpg exists. The preview here is the
        // unsuffixed expected name; if main collision-adjusts, the
        // toast on success shows the actual name.
        if (!filePath) return '';
        // Last slash or backslash position.
        const lastSep = Math.max(filePath.lastIndexOf('/'), filePath.lastIndexOf('\\'));
        const baseWithExt = lastSep >= 0 ? filePath.substring(lastSep + 1) : filePath;
        const dotIdx = baseWithExt.lastIndexOf('.');
        const base = dotIdx > 0 ? baseWithExt.substring(0, dotIdx) : baseWithExt;
        return base + '_E.jpg';
      }
      function updateSaveAvailability() {
        const modified = isFilterModified();
        // v2.0.15 — viewer.html tracks the current file as files[currentIndex].
        const filePath = (typeof files !== 'undefined' && typeof currentIndex !== 'undefined' && files[currentIndex]) ? files[currentIndex] : '';
        const hasFile = !!filePath;
        const enabled = modified && hasFile;
        if (saveNewBtn) saveNewBtn.disabled = !enabled;
        if (saveReplaceBtn) saveReplaceBtn.disabled = !enabled;
        if (savePreview) {
          if (enabled) {
            savePreview.style.display = '';
            if (savePreviewFilename) savePreviewFilename.textContent = deriveEnhancedFilename(filePath);
          } else {
            savePreview.style.display = 'none';
          }
        }
      }
      // Update availability whenever sliders or BW change. We piggyback
      // by listening on the inputs we already bound above. The original
      // event handlers still fire first; this runs after.
      [sBright, sContrast, sSat, sTemp].forEach(function (el) {
        el.addEventListener('input', updateSaveAvailability);
      });
      tBW.addEventListener('change', updateSaveAvailability);
      // Re-check availability when the panel opens or new image loads.
      openBtn.addEventListener('click', updateSaveAvailability);
      window.addEventListener('keydown', function (e) {
        if (e.key === 'e' || e.key === 'E') {
          setTimeout(updateSaveAvailability, 0);
        }
      });
      // Re-check on image swap via the same MutationObserver above —
      // but that observer is already firing for filter re-apply. Add a
      // small RAF-deferred update so files[currentIndex] has settled.
      if (containerEl && typeof MutationObserver !== 'undefined') {
        const moSave = new MutationObserver(function () {
          requestAnimationFrame(updateSaveAvailability);
        });
        moSave.observe(containerEl, { childList: true, subtree: true });
      }

      async function performSave(mode) {
        // v2.0.15 — viewer.html tracks the current file as files[currentIndex].
        const filePath = (typeof files !== 'undefined' && typeof currentIndex !== 'undefined' && files[currentIndex]) ? files[currentIndex] : '';
        if (!filePath || !isFilterModified()) return;
        const pdrViewer = (window.pdr && window.pdr.viewer) ? window.pdr.viewer : null;
        if (!pdrViewer || !pdrViewer.saveEnhanced) {
          console.warn('[enhance] saveEnhanced not exposed on window.pdr.viewer');
          return;
        }
        // Confirm before replacing.
        if (mode === 'replace') {
          const ok = window.confirm(
            'Replace the original file with these adjustments?\n\n' +
            'This overwrites the file on disk. There is no undo from here.\n\n' +
            'Click Cancel to save as a new file instead.'
          );
          if (!ok) return;
        }
        // Disable buttons during the save to prevent double-clicks.
        const targets = [saveNewBtn, saveReplaceBtn];
        targets.forEach(function (b) { if (b) { b.disabled = true; b.classList.add('enhance-save-saving'); } });
        // v2.0.15 (Terry 2026-06-06) — log the state being sent so
        // any "saved file looks wrong" report has a verifiable trail
        // in main.log (renderer console.log is captured there).
        console.log('[enhance] saving — mode=' + mode + ' state=' + JSON.stringify(state));
        try {
          const result = await pdrViewer.saveEnhanced({
            filePath: filePath,
            mode: mode,
            filterState: {
              brightness: state.brightness,
              contrast: state.contrast,
              saturation: state.saturation,
              temperature: state.temperature,
              bw: state.bw,
            },
            enhancementType: 'manual',
            enhancementMethod: 'manual',
          });
          if (result && result.success) {
            const msg = mode === 'new'
              ? ('Saved as ' + (result.newFilePath || '').split(/[\\/]/).pop())
              : 'Original file replaced — adjustments are now baked in';
            // Inline transient success — appears in the panel, fades after 4s.
            const successEl = document.getElementById('enhance-save-success');
            if (successEl) {
              successEl.textContent = msg;
              successEl.style.display = '';
              // Re-trigger the fade animation on each save.
              successEl.style.animation = 'none';
              // Force reflow then re-add to restart animation.
              void successEl.offsetWidth;
              successEl.style.animation = '';
              // Hide after the animation finishes so the panel doesn't
              // hold stale success text indefinitely.
              setTimeout(function () { successEl.style.display = 'none'; }, 4100);
            }
            console.log('[enhance] ' + msg);
            // v2.0.15 (Terry 2026-06-06) — load the just-saved file into
            // the viewer so the user sees their result instead of the
            // viewer reverting visually to the original.
            //   • 'new'     → insert new file after current and switch to it
            //   • 'replace' → reload current path so the new bytes show
            // resetState() runs LAST so sliders reflect the saved state
            // (default = file already has the adjustments baked in).
            try {
              if (mode === 'new' && result.newFilePath) {
                files.splice(currentIndex + 1, 0, result.newFilePath);
                loadMedia(currentIndex + 1);
              } else if (mode === 'replace') {
                loadMedia(currentIndex);
              }
            } catch (navErr) {
              console.warn('[enhance] post-save viewer reload failed:', navErr);
            }
            resetState();
          } else {
            const err = (result && result.error) || 'Save failed.';
            window.alert('Enhanced save failed:\n\n' + err);
          }
        } catch (err) {
          window.alert('Enhanced save error:\n\n' + (err && err.message ? err.message : String(err)));
        } finally {
          targets.forEach(function (b) { if (b) { b.classList.remove('enhance-save-saving'); } });
          updateSaveAvailability();
        }
      }

      if (saveNewBtn) saveNewBtn.addEventListener('click', function () { performSave('new'); });
      if (saveReplaceBtn) saveReplaceBtn.addEventListener('click', function () { performSave('replace'); });

      // Initial state.
      updateSaveAvailability();
    })();
  </script>
</body>
</html>
