<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDR Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, "Segoe UI", "Inter", sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #12122a;
      border-bottom: 1px solid rgba(169, 156, 255, 0.15);
      -webkit-app-region: drag;
      flex-shrink: 0;
    }
    .toolbar-title {
      font-size: 13px;
      font-weight: 500;
      color: #ccc;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      margin-right: 12px;
    }
    .toolbar-actions {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }
    .toolbar-btn {
      padding: 4px 10px;
      border: 1px solid rgba(169, 156, 255, 0.25);
      border-radius: 8px;
      background: rgba(169, 156, 255, 0.08);
      color: #bbb;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toolbar-btn:hover {
      background: rgba(169, 156, 255, 0.18);
      color: #fff;
      border-color: rgba(169, 156, 255, 0.4);
    }
    .toolbar-btn[hidden] { display: none; }
    .speed-wrap { position: relative; -webkit-app-region: no-drag; }
    .speed-menu {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      background: rgba(18,18,42,0.96);
      border: 1px solid rgba(169,156,255,0.25);
      border-radius: 8px;
      padding: 4px 0;
      min-width: 80px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.4);
      z-index: 100;
    }
    .speed-menu button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 5px 12px;
      font-size: 12px;
      color: #ccc;
      background: transparent;
      border: none;
      cursor: pointer;
    }
    .speed-menu button:hover { background: rgba(169,156,255,0.12); color: #fff; }
    .speed-menu button.active { color: #A99CFF; background: rgba(169,156,255,0.08); }
    .toolbar-counter {
      font-size: 12px;
      color: #A99CFF;
      font-weight: 600;
      padding: 3px 10px;
      background: rgba(169, 156, 255, 0.1);
      border-radius: 8px;
      white-space: nowrap;
    }
    .viewer-container {
      /* Kept as a plain block container to match the pre-video-playback
         original. Absolute-positioned children (the <img>, nav arrows,
         and video wrapper) all position themselves via transform /
         top-left, so the container only needs position:relative +
         overflow:hidden. Adding display:flex here previously broke the
         image fit math because it changed how clientWidth/Height
         interacted with the absolutely-positioned media during layout. */
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .viewer-container img {
      position: absolute;
      transform-origin: 0 0;
      cursor: grab;
    }
    .viewer-container img.dragging {
      cursor: grabbing;
    }
    .viewer-container video {
      /* Centred via absolute positioning since the parent is no longer
         a flex container. max-width/height: 100% keeps the video scaled
         to fit the viewer without overflow. */
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 100%;
      max-height: 100%;
      background: #000;
      outline: none;
    }
    /* Navigation arrows overlaid on the viewer */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(169, 156, 255, 0.35);
      color: #eee;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s, background 0.15s, color 0.15s, transform 0.15s;
      /* Persistently visible (60%) when shown — was opacity:0 + hover-only,
         which left users unsure the arrows existed. Hovering the arrow
         itself bumps it to 100%. Hidden entirely via display:none in JS
         when there's only a single file (nothing to navigate to). */
      opacity: 0.6;
    }
    .viewer-container:hover .nav-arrow { opacity: 0.9; }
    .nav-arrow:hover { background: rgba(169, 156, 255, 0.35); color: #fff; opacity: 1; transform: translateY(-50%) scale(1.06); }
    .nav-arrow.left { left: 16px; }
    .nav-arrow.right { right: 16px; }
    .nav-arrow:disabled { opacity: 0.2 !important; cursor: default; }
    /* Cross-window Fix-in-progress chip — same amber pill PDR shows
       on every other window so users always know a Fix is running.
       Pinned top-center, pulses to draw attention. pointer-events:
       none so clicks pass through (this window can't interact with
       the fix). */
    .fix-chip {
      position: fixed;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 9999px;
      background: #f59e0b;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.01em;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
      box-shadow: 0 0 0 2px rgba(252, 211, 77, 0.4), 0 4px 14px rgba(0, 0, 0, 0.35);
      pointer-events: none;
      user-select: none;
      animation: fix-chip-pulse 1.5s ease-in-out infinite;
      white-space: nowrap;
    }
    .fix-chip.visible { display: inline-flex; }
    .fix-chip .spinner {
      width: 12px; height: 12px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: fix-chip-spin 0.9s linear infinite;
    }
    @keyframes fix-chip-pulse {
      0%, 100% { box-shadow: 0 0 0 2px rgba(252, 211, 77, 0.4), 0 4px 14px rgba(0, 0, 0, 0.35); transform: translateX(-50%) scale(1); }
      50% { box-shadow: 0 0 0 6px rgba(252, 211, 77, 0), 0 4px 14px rgba(0, 0, 0, 0.35); transform: translateX(-50%) scale(1.025); }
    }
    @keyframes fix-chip-spin {
      to { transform: rotate(360deg); }
    }
    .info-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      background: #12122a;
      border-top: 1px solid rgba(169, 156, 255, 0.15);
      font-size: 11px;
      color: #888;
      flex-shrink: 0;
    }
    .zoom-level { font-weight: 500; color: #A99CFF; }
    .no-image {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 14px;
      gap: 10px;
      height: 100%;
      text-align: center;
      padding: 24px;
    }
    .no-image .action {
      margin-top: 8px;
      padding: 8px 18px;
      border: 1px solid rgba(169, 156, 255, 0.4);
      border-radius: 8px;
      background: rgba(169, 156, 255, 0.15);
      color: #cfc7ff;
      font-size: 13px;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .no-image .action:hover { background: rgba(169, 156, 255, 0.3); color: #fff; }
    .filmstrip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      background: #12122a;
      border-top: 1px solid rgba(169, 156, 255, 0.15);
      overflow-x: auto;
      flex-shrink: 0;
      min-height: 80px;
    }
    .filmstrip::-webkit-scrollbar { height: 4px; }
    .filmstrip::-webkit-scrollbar-thumb { background: rgba(169,156,255,0.3); border-radius: 2px; }
    .filmstrip .thumb {
      height: 60px;
      width: auto;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.6;
      transition: all 0.15s;
      flex-shrink: 0;
      display: block;
    }
    .filmstrip .thumb:hover { opacity: 0.9; border-color: rgba(169,156,255,0.4); }
    .filmstrip .thumb.active { opacity: 1; border-color: #A99CFF; }
    .filmstrip .video-thumb {
      position: relative;
      height: 60px;
      width: 80px;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.6;
      transition: all 0.15s;
      flex-shrink: 0;
      background: #222 center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .filmstrip .video-thumb:hover { opacity: 0.9; border-color: rgba(169,156,255,0.4); }
    .filmstrip .video-thumb.active { opacity: 1; border-color: #A99CFF; }
    .filmstrip .video-thumb::after {
      content: '';
      position: absolute;
      width: 0; height: 0;
      border-left: 10px solid rgba(255,255,255,0.85);
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      filter: drop-shadow(0 0 4px rgba(0,0,0,0.6));
    }
  </style>
</head>
<body>
  <!-- Cross-window Fix-in-progress chip — populated by JS at the
       bottom of this file via window.pdr.onFixProgress /
       onFixStateChanged. Same amber pill the rest of PDR shows. -->
  <div class="fix-chip" id="fix-chip" title="A Fix is in progress in PDR">
    <span class="spinner"></span>
    <span id="fix-chip-text">Fix · Working</span>
  </div>
  <div class="toolbar">
    <span class="toolbar-title" id="filename">PDR Viewer</span>
    <div class="toolbar-actions">
      <span class="toolbar-counter" id="counter" style="display:none"></span>
      <button class="toolbar-btn" id="btn-fit" title="Fit to window (F)">Fit</button>
      <button class="toolbar-btn" id="btn-100" title="Actual size (0)">100%</button>
      <button class="toolbar-btn" id="btn-zoomIn" title="Zoom in (+)">+</button>
      <button class="toolbar-btn" id="btn-zoomOut" title="Zoom out (-)">−</button>
      <button class="toolbar-btn" id="btn-rotateLeft" title="Rotate left 90° (R)">⟲</button>
      <button class="toolbar-btn" id="btn-rotateRight" title="Rotate right 90° (Shift+R)">⟳</button>
      <button class="toolbar-btn" id="btn-slideshow" title="Start slideshow (Space)" hidden>▶</button>
      <div class="speed-wrap" id="slideshow-wrap" hidden>
        <button class="toolbar-btn" id="btn-slideshowInterval" title="Slideshow interval">5s</button>
        <div class="speed-menu" id="slideshow-menu" style="display:none"></div>
      </div>
      <div class="speed-wrap" id="speed-wrap" hidden>
        <button class="toolbar-btn" id="btn-speed" title="Playback speed (shift+, / shift+.)">1x</button>
        <div class="speed-menu" id="speed-menu" style="display:none"></div>
      </div>
      <button class="toolbar-btn" id="btn-openExternal" title="Open in system player" hidden>Open externally</button>
    </div>
  </div>
  <div class="viewer-container" id="container">
    <button class="nav-arrow left" id="btn-prev" title="Previous (←)">&#8249;</button>
    <button class="nav-arrow right" id="btn-next" title="Next (→)">&#8250;</button>
    <div class="no-image" id="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <circle cx="8.5" cy="8.5" r="1.5"></circle>
        <polyline points="21 15 16 10 5 21"></polyline>
      </svg>
      <span>No image loaded</span>
    </div>
  </div>
  <div id="filmstrip" class="filmstrip" style="display:none"></div>
  <div class="info-bar">
    <span id="dimensions"></span>
    <span class="zoom-level" id="zoomLabel">100%</span>
  </div>

  <script>
    const container = document.getElementById('container');
    const placeholder = document.getElementById('placeholder');
    const filenameEl = document.getElementById('filename');
    const dimensionsEl = document.getElementById('dimensions');
    const zoomLabelEl = document.getElementById('zoomLabel');
    const filmstripEl = document.getElementById('filmstrip');
    const counterEl = document.getElementById('counter');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const btnFit = document.getElementById('btn-fit');
    const btn100 = document.getElementById('btn-100');
    const btnZoomIn = document.getElementById('btn-zoomIn');
    const btnZoomOut = document.getElementById('btn-zoomOut');
    const btnRotateLeft = document.getElementById('btn-rotateLeft');
    const btnRotateRight = document.getElementById('btn-rotateRight');
    const btnOpenExternal = document.getElementById('btn-openExternal');
    const speedWrap = document.getElementById('speed-wrap');
    const btnSpeed = document.getElementById('btn-speed');
    const speedMenu = document.getElementById('speed-menu');
    const btnSlideshow = document.getElementById('btn-slideshow');
    const slideshowWrap = document.getElementById('slideshow-wrap');
    const btnSlideshowInterval = document.getElementById('btn-slideshowInterval');
    const slideshowMenu = document.getElementById('slideshow-menu');

    const PLAYBACK_RATES = [0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2];
    let playbackRate = 1;

    function renderSpeedMenu() {
      speedMenu.innerHTML = '';
      PLAYBACK_RATES.forEach((r) => {
        const b = document.createElement('button');
        b.textContent = r === 1 ? 'Normal' : (r + 'x');
        if (Math.abs(r - playbackRate) < 0.001) b.classList.add('active');
        b.addEventListener('click', () => {
          playbackRate = r;
          btnSpeed.textContent = r === 1 ? '1x' : (r + 'x');
          if (mediaEl && isVideo) mediaEl.playbackRate = r;
          speedMenu.style.display = 'none';
          renderSpeedMenu();
        });
        speedMenu.appendChild(b);
      });
    }
    renderSpeedMenu();

    btnSpeed.addEventListener('click', (e) => {
      e.stopPropagation();
      speedMenu.style.display = speedMenu.style.display === 'none' ? 'block' : 'none';
    });
    document.addEventListener('click', (e) => {
      if (!speedWrap.contains(e.target)) speedMenu.style.display = 'none';
    });

    const VIDEO_EXTS = new Set(['mp4','mov','m4v','avi','mkv','webm','wmv','flv','3gp','mpg','mpeg']);

    let mediaEl = null;       // either <img> or <video>
    let isVideo = false;
    let zoom = 1;
    let panX = 0, panY = 0;
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let panStartX = 0, panStartY = 0;
    let fitZoom = 1;
    // User-applied rotation in degrees (0/90/180/270). Loaded from
    // PDR's index when an image opens, persisted back on every rotate
    // button click. Layered on top of EXIF auto-rotation (which the
    // <img> tag already honours), so this is purely the user's manual
    // override. Reset to 0 between media transitions and re-fetched.
    let userRotation = 0;
    // True once the user has explicitly zoomed (wheel / +/- / 100%).
    // Resets whenever a new image is loaded. While false, any layout change
    // to the viewer container re-runs fitToWindow so the photo always ends
    // up correctly sized and centred regardless of when the container
    // finishes laying out.
    let userHasZoomed = false;

    // Multi-file support
    let files = [];
    let currentIndex = 0;

    // Parse file paths from URL params
    const params = new URLSearchParams(window.location.search);
    const filesParam = params.get('files');
    const legacyFile = params.get('file'); // backwards compat
    // Optional start index — when set, opens the viewer with the
    // clicked thumbnail (not the first sibling). Lets a Memories
    // grid click on photo #14 of 175 land directly on #14 with the
    // 173 others reachable via the arrow buttons.
    const startParam = params.get('start');

    if (filesParam) {
      try { files = JSON.parse(filesParam); } catch { files = []; }
    } else if (legacyFile) {
      files = [legacyFile];
    }
    // Clamp the requested start to a valid index — defensively, since
    // the URL param isn't trusted.
    let startIndex = 0;
    if (startParam != null) {
      const parsed = parseInt(startParam, 10);
      if (!isNaN(parsed) && parsed >= 0 && parsed < files.length) startIndex = parsed;
    }

    function getExt(filePath) {
      const m = filePath.match(/\.([^.\\/]+)$/);
      return m ? m[1].toLowerCase() : '';
    }
    function isVideoPath(filePath) { return VIDEO_EXTS.has(getExt(filePath)); }
    function getFileSrc(filePath) {
      // Put the path in a query param so Chromium's URL parser (which
      // treats pdr-file as 'standard' scheme) can't mangle the C: drive
      // letter when serialising the URL.
      return 'pdr-file://local/?f=' + encodeURIComponent(filePath.replace(/\\/g, '/'));
    }
    function getFileSrcFallback(filePath) {
      return 'file:///' + encodeURI(filePath.replace(/\\/g, '/'));
    }
    function getFilename(filePath) {
      return filePath.split(/[/\\]/).pop() || 'Viewer';
    }

    async function fetchVideoThumb(filePath) {
      try {
        if (!window.pdr || !window.pdr.browser) return null;
        const r = await window.pdr.browser.thumbnail(filePath, 160);
        if (r && r.success && r.dataUrl) return r.dataUrl;
      } catch {}
      return null;
    }

    function openInSystemPlayer(filePath) {
      if (!window.pdr || !window.pdr.openExternal) return;
      const encoded = encodeURI(filePath.replace(/\\/g, '/'));
      window.pdr.openExternal('file:///' + encoded);
    }

    function setImageControlsVisible(show) {
      btnFit.hidden = !show;
      btn100.hidden = !show;
      btnZoomIn.hidden = !show;
      btnZoomOut.hidden = !show;
      btnRotateLeft.hidden = !show;
      btnRotateRight.hidden = !show;
      zoomLabelEl.style.visibility = show ? '' : 'hidden';
      speedWrap.hidden = show;
      // Slideshow only makes sense for images (auto-advance), and only
      // when we have more than one file in the queue. The interval
      // picker tracks the same visibility.
      const slideshowable = show && files.length > 1;
      btnSlideshow.hidden = !slideshowable;
      slideshowWrap.hidden = !slideshowable;
    }

    function showUnplayable(filePath) {
      placeholder.innerHTML = '';
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('width', '48'); svg.setAttribute('height', '48');
      svg.setAttribute('viewBox', '0 0 24 24'); svg.setAttribute('fill', 'none');
      svg.setAttribute('stroke', '#A99CFF'); svg.setAttribute('stroke-width', '1.5');
      svg.setAttribute('stroke-linecap', 'round'); svg.setAttribute('stroke-linejoin', 'round');
      svg.innerHTML = '<polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>';
      placeholder.appendChild(svg);
      const msg = document.createElement('span');
      msg.textContent = "This video format isn't supported by the built-in player.";
      placeholder.appendChild(msg);
      const hint = document.createElement('span');
      hint.style.color = '#666'; hint.style.fontSize = '11px';
      hint.textContent = getFilename(filePath);
      placeholder.appendChild(hint);
      const btn = document.createElement('button');
      btn.className = 'action';
      btn.textContent = 'Open in system player';
      btn.addEventListener('click', () => openInSystemPlayer(filePath));
      placeholder.appendChild(btn);
      placeholder.style.display = 'flex';
    }

    function loadMedia(index) {
      if (index < 0 || index >= files.length) return;
      currentIndex = index;
      const filePath = files[currentIndex];
      // Tell other windows (e.g. People Manager's FaceGridModal) where
      // we are now, so their selection ring can follow the viewer
      // arrows without the user having to come back to PM and re-pick.
      try { window.pdr?.search?.notifyViewerIndex?.(currentIndex, filePath); } catch {}

      // Remove old media
      if (mediaEl) {
        try { if (isVideo) mediaEl.pause(); } catch {}
        mediaEl.remove();
        mediaEl = null;
      }
      // Remove any stray status/preparing panes from a previous async load
      container.querySelectorAll('.no-image:not(#placeholder)').forEach((n) => n.remove());

      // Fresh file → fresh fit state. Any zoom the user applied to the
      // previous photo is forgotten here, so the new photo always opens
      // correctly fitted + centred.
      userHasZoomed = false;
      zoom = 1;
      panX = 0;
      panY = 0;
      fitZoom = 1;
      // Reset rotation; a real value is fetched from PDR's index once
      // the image binds (see the img.onload handler below). Defaults
      // to 0 if the file isn't indexed.
      userRotation = 0;
      placeholder.style.display = 'none';
      placeholder.innerHTML = '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg><span>No image loaded</span>';

      isVideo = isVideoPath(filePath);
      setImageControlsVisible(!isVideo);
      btnOpenExternal.hidden = !isVideo;

      if (isVideo) {
        // Show a transcoding status while we wait for ffmpeg (no-op for
        // natively-supported formats — prepare() returns immediately).
        const status = document.createElement('div');
        status.className = 'no-image';
        status.innerHTML = '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#A99CFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg><span>Preparing video…</span><span style="color:#666;font-size:11px">Older formats are transcoded on first play. Subsequent opens are instant.</span>';
        placeholder.style.display = 'none';
        container.appendChild(status);

        const prepareStarted = filePath;
        // Attach the video with TWO candidate URLs — the primary (usually the
        // transcoded MP4) and a file:// fallback of that SAME file. The old
        // code mistakenly fell back to file:// of the original .mpg, which
        // Chromium couldn't play either way.
        const useSrc = (primaryUrl, fallbackUrl, label) => {
          if (currentIndex < 0 || files[currentIndex] !== prepareStarted) return;
          status.remove();
          const video = document.createElement('video');
          video.controls = true;
          video.autoplay = false;
          video.preload = 'metadata';
          video.onloadedmetadata = () => {
            dimensionsEl.textContent = video.videoWidth + ' \u00d7 ' + video.videoHeight + ' px \u2022 ' + Math.round(video.duration) + 's';
            video.playbackRate = playbackRate;
            console.log('[video] loaded metadata for', label);
          };
          let retried = false;
          video.onerror = () => {
            const err = video.error;
            console.warn('[video] error loading', label, 'src=' + video.src, 'code=' + (err && err.code), 'message=' + (err && err.message));
            if (!retried && fallbackUrl) {
              retried = true;
              console.log('[video] retrying with fallback URL');
              video.src = fallbackUrl;
              return;
            }
            video.remove();
            mediaEl = null;
            showUnplayable(filePath);
          };
          video.src = primaryUrl;
          container.appendChild(video);
          mediaEl = video;
        };

        (async () => {
          try {
            if (window.pdr && window.pdr.video && window.pdr.video.prepare) {
              console.log('[video] calling prepare() for', filePath);
              const r = await window.pdr.video.prepare(filePath);
              console.log('[video] prepare returned:', JSON.stringify(r));
              if (r && r.success && r.playableUrl) {
                // If a cachePath is returned, use it as the file:// fallback;
                // otherwise fall back to file:// of whatever pdr-file:// URL we got.
                const fallback = r.cachePath
                  ? 'file:///' + encodeURI(r.cachePath.replace(/\\/g, '/'))
                  : null;
                useSrc(r.playableUrl, fallback, 'prepared');
                return;
              }
              console.warn('[video] prepare failed:', r && r.error);
            }
          } catch (e) {
            console.warn('[video] prepare threw:', e && e.message);
          }
          // Last-resort: raw URL. Most of the time this will fail for formats
          // that required prepare in the first place, so showUnplayable is the
          // likely outcome — but at least we try.
          useSrc(getFileSrc(filePath), getFileSrcFallback(filePath), 'raw');
        })();
      } else {
        const img = document.createElement('img');
        img.src = getFileSrc(filePath);
        img.onload = () => {
          dimensionsEl.textContent = img.naturalWidth + ' \u00d7 ' + img.naturalHeight + ' px';
          // Pull the saved rotation for this file BEFORE the first fit
          // so the fit math accounts for the rotated bounding box (a
          // 90\u00b0/270\u00b0 image's natural aspect is swapped). Falls back to
          // 0 silently if the IPC isn't available or the file isn't
          // in the index yet.
          (async () => {
            try {
              if (window.pdr && window.pdr.viewer && window.pdr.viewer.getRotation) {
                const r = await window.pdr.viewer.getRotation(filePath);
                if (r && r.success) userRotation = ((r.rotation || 0) % 360 + 360) % 360;
              }
            } catch {}
            fitToWindow();
            requestAnimationFrame(fitToWindow);
          })();
        };
        let retried = false;
        img.onerror = () => {
          if (!retried) {
            retried = true;
            img.src = getFileSrcFallback(filePath);
          } else {
            img.remove();
            mediaEl = null;
            placeholder.innerHTML = '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#c44" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg><span style="color:#c44">File not found</span><span style="color:#666;font-size:11px;max-width:80%;word-break:break-all;text-align:center">' + filePath + '</span>';
            placeholder.style.display = 'flex';
          }
        };
        container.appendChild(img);
        mediaEl = img;
      }

      const name = getFilename(filePath);
      filenameEl.textContent = name;
      document.title = name + ' \u2014 PDR Viewer';

      // Update counter
      if (files.length > 1) {
        counterEl.style.display = '';
        counterEl.textContent = (currentIndex + 1) + ' / ' + files.length;
      }

      // Update nav arrows
      btnPrev.disabled = currentIndex === 0;
      btnNext.disabled = currentIndex === files.length - 1;

      // Update filmstrip active state
      updateFilmstripActive();
    }

    function updateFilmstripActive() {
      const thumbs = filmstripEl.querySelectorAll('[data-idx]');
      thumbs.forEach((t) => {
        t.classList.toggle('active', parseInt(t.dataset.idx, 10) === currentIndex);
      });
      const active = filmstripEl.querySelector('.active');
      if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    // Build filmstrip for multi-file
    if (files.length > 1) {
      filmstripEl.style.display = 'flex';
      files.forEach((fp, idx) => {
        if (isVideoPath(fp)) {
          const div = document.createElement('div');
          div.className = 'video-thumb';
          div.title = getFilename(fp);
          div.dataset.idx = String(idx);
          div.addEventListener('click', () => loadMedia(idx));
          // Async: fetch the generated frame thumbnail via the IPC bridge
          fetchVideoThumb(fp).then((dataUrl) => {
            if (dataUrl) div.style.backgroundImage = 'url(' + dataUrl + ')';
          });
          filmstripEl.appendChild(div);
        } else {
          const thumb = document.createElement('img');
          thumb.className = 'thumb';
          thumb.src = getFileSrc(fp);
          thumb.onerror = () => { thumb.src = getFileSrcFallback(fp); };
          thumb.title = getFilename(fp);
          thumb.dataset.idx = String(idx);
          thumb.addEventListener('click', () => loadMedia(idx));
          filmstripEl.appendChild(thumb);
        }
      });
      btnPrev.style.display = 'flex';
      btnNext.style.display = 'flex';
    } else {
      btnPrev.style.display = 'none';
      btnNext.style.display = 'none';
    }

    if (files.length > 0) {
      loadMedia(startIndex);
    }

    // Diagnostic: confirm preload attached + prepare() available
    console.log('[viewer] window.pdr =', !!window.pdr, '| video.prepare =', !!(window.pdr && window.pdr.video && window.pdr.video.prepare), '| files =', files.length);

    // Navigation — manual nav stops any running slideshow so the user
    // doesn't fight an auto-advance after taking control.
    btnPrev.addEventListener('click', (e) => { e.stopPropagation(); stopSlideshow(); loadMedia(currentIndex - 1); });
    btnNext.addEventListener('click', (e) => { e.stopPropagation(); stopSlideshow(); loadMedia(currentIndex + 1); });
    btnOpenExternal.addEventListener('click', () => {
      const fp = files[currentIndex];
      if (fp) openInSystemPlayer(fp);
    });

    function fitToWindow() {
      if (!mediaEl || isVideo) return;
      const cw = container.clientWidth;
      const ch = container.clientHeight;
      // Effective bounding-box dims account for user rotation — at
      // 90°/270° the natural width and height swap so the fit math
      // has to compare the rotated rectangle against the container.
      const swap = userRotation === 90 || userRotation === 270;
      const iw = swap ? mediaEl.naturalHeight : mediaEl.naturalWidth;
      const ih = swap ? mediaEl.naturalWidth : mediaEl.naturalHeight;
      if (cw <= 0 || ch <= 0 || iw <= 0 || ih <= 0) {
        console.log('[viewer] skip fit — bad dims', { cw, ch, iw, ih });
        return;
      }
      fitZoom = Math.min(cw / iw, ch / ih, 1);
      zoom = fitZoom;
      panX = Math.max(0, (cw - iw * zoom) / 2);
      panY = Math.max(0, (ch - ih * zoom) / 2);
      console.log('[viewer] fit', { cw, ch, iw, ih, zoom: Number(zoom.toFixed(3)), panX: Number(panX.toFixed(0)), panY: Number(panY.toFixed(0)), rot: userRotation });
      applyTransform();
    }

function zoomTo(newZoom, centreX, centreY) {
      if (!mediaEl || isVideo) return;
      newZoom = Math.max(0.05, Math.min(newZoom, 20));
      const imgX = (centreX - panX) / zoom;
      const imgY = (centreY - panY) / zoom;
      zoom = newZoom;
      panX = centreX - imgX * zoom;
      panY = centreY - imgY * zoom;
      applyTransform();
    }

    function zoomToCenter(newZoom) {
      const cw = container.clientWidth;
      const ch = container.clientHeight;
      zoomTo(newZoom, cw / 2, ch / 2);
    }

    function applyTransform() {
      if (!mediaEl || isVideo) return;
      // Order matters: translate first, then rotate around the
      // image's own centre, then scale. Rotating around the centre
      // (as opposed to 0,0) keeps the visual centre of the rotated
      // image at the same screen position, so a fit-window state
      // stays centred after rotation. transform-origin is set to
      // center center via inline style here so we don't disturb the
      // existing 0 0 origin used by the static CSS rule.
      mediaEl.style.transformOrigin = userRotation === 0 ? '0 0' : 'center center';
      if (userRotation === 0) {
        mediaEl.style.transform = 'translate(' + panX + 'px, ' + panY + 'px) scale(' + zoom + ')';
      } else {
        // For rotated images we centre the natural-size box at the
        // computed pan offset, then rotate, then scale. Rotation
        // around the centre means panX/panY refer to the centre of
        // the rotated box, so we translate by half-width/height into
        // the rectangle the fit math computed.
        const swap = userRotation === 90 || userRotation === 270;
        const effW = swap ? mediaEl.naturalHeight : mediaEl.naturalWidth;
        const effH = swap ? mediaEl.naturalWidth : mediaEl.naturalHeight;
        const cx = panX + (effW * zoom) / 2;
        const cy = panY + (effH * zoom) / 2;
        mediaEl.style.transform =
          'translate(' + (cx - mediaEl.naturalWidth / 2) + 'px, ' + (cy - mediaEl.naturalHeight / 2) + 'px) ' +
          'rotate(' + userRotation + 'deg) ' +
          'scale(' + zoom + ')';
      }
      zoomLabelEl.textContent = Math.round(zoom * 100) + '%';
    }

    function clampPan() {
      if (!mediaEl || isVideo) return;
      const cw = container.clientWidth;
      const ch = container.clientHeight;
      const iw = mediaEl.naturalWidth * zoom;
      const ih = mediaEl.naturalHeight * zoom;

      if (iw <= cw) { panX = (cw - iw) / 2; }
      else { panX = Math.min(0, Math.max(cw - iw, panX)); }
      if (ih <= ch) { panY = (ch - ih) / 2; }
      else { panY = Math.min(0, Math.max(ch - ih, panY)); }
      applyTransform();
    }

    // Note: btnFit explicitly re-enables auto-fit for future resizes by
    // clearing userHasZoomed. Every other zoom action sets it to true so
    // the auto-fit listeners stop fighting the user.
    btnFit.addEventListener('click', () => { userHasZoomed = false; fitToWindow(); });
    btn100.addEventListener('click', () => { userHasZoomed = true; zoomToCenter(1); });
    btnZoomIn.addEventListener('click', () => { userHasZoomed = true; zoomToCenter(zoom * 1.25); });
    btnZoomOut.addEventListener('click', () => { userHasZoomed = true; zoomToCenter(zoom / 1.25); });

    // ── Rotate ─────────────────────────────────────────────────────
    // Each click adjusts userRotation by ±90°, persists the new value
    // back into PDR's index keyed on file_path, then re-runs
    // fitToWindow so the rotated photo lands centred at the right
    // size. Persistence is best-effort — IPC failure logs a warning
    // but the visual change still applies for this session.
    function rotateBy(delta) {
      if (!mediaEl || isVideo) return;
      const filePath = files[currentIndex];
      if (!filePath) return;
      userRotation = ((userRotation + delta) % 360 + 360) % 360;
      userHasZoomed = false;
      fitToWindow();
      try {
        if (window.pdr && window.pdr.viewer && window.pdr.viewer.setRotation) {
          window.pdr.viewer.setRotation(filePath, userRotation).catch((err) => {
            console.warn('[viewer] rotation persist failed:', err && err.message);
          });
        }
      } catch (err) {
        console.warn('[viewer] rotation IPC threw:', err && err.message);
      }
    }
    btnRotateLeft.addEventListener('click', () => rotateBy(-90));
    btnRotateRight.addEventListener('click', () => rotateBy(90));

    // ── Slideshow ──────────────────────────────────────────────────
    // Auto-advance through the file list at a user-chosen interval.
    // Stops automatically when the user takes any other action
    // (zoom, drag, manual nav). Interval choices reuse the same
    // dropdown styling as the video-speed picker so the toolbar
    // stays visually consistent.
    const SLIDESHOW_INTERVALS = [3, 5, 10, 15, 30];
    let slideshowIntervalSec = 5;
    let slideshowTimerId = null;
    function isSlideshowRunning() { return slideshowTimerId != null; }
    function renderSlideshowMenu() {
      slideshowMenu.innerHTML = '';
      SLIDESHOW_INTERVALS.forEach((sec) => {
        const b = document.createElement('button');
        b.textContent = sec + 's';
        if (sec === slideshowIntervalSec) b.classList.add('active');
        b.addEventListener('click', () => {
          slideshowIntervalSec = sec;
          btnSlideshowInterval.textContent = sec + 's';
          slideshowMenu.style.display = 'none';
          renderSlideshowMenu();
          // Restart with the new interval if a slideshow is running
          if (isSlideshowRunning()) {
            stopSlideshow();
            startSlideshow();
          }
        });
        slideshowMenu.appendChild(b);
      });
    }
    renderSlideshowMenu();
    btnSlideshowInterval.addEventListener('click', (e) => {
      e.stopPropagation();
      slideshowMenu.style.display = slideshowMenu.style.display === 'none' ? 'block' : 'none';
    });
    document.addEventListener('click', (e) => {
      if (!slideshowWrap.contains(e.target)) slideshowMenu.style.display = 'none';
    });
    function advanceSlideshow() {
      if (!isSlideshowRunning()) return;
      // Loop at the end so a "set it and forget it" run doesn't
      // dead-end on the last photo. Wraps cleanly via modulo.
      const next = (currentIndex + 1) % files.length;
      loadMedia(next);
    }
    function startSlideshow() {
      if (isSlideshowRunning()) return;
      if (files.length <= 1) return;
      slideshowTimerId = setInterval(advanceSlideshow, slideshowIntervalSec * 1000);
      btnSlideshow.textContent = '❚❚';
      btnSlideshow.title = 'Pause slideshow (Space)';
    }
    function stopSlideshow() {
      if (slideshowTimerId) {
        clearInterval(slideshowTimerId);
        slideshowTimerId = null;
      }
      btnSlideshow.textContent = '▶';
      btnSlideshow.title = 'Start slideshow (Space)';
    }
    btnSlideshow.addEventListener('click', () => {
      if (isSlideshowRunning()) stopSlideshow(); else startSlideshow();
    });

    // Mouse wheel zoom — images only
    container.addEventListener('wheel', (e) => {
      if (!mediaEl || isVideo) return;
      e.preventDefault();
      userHasZoomed = true;
      const rect = container.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;
      const factor = e.deltaY > 0 ? 0.92 : 1.08;
      zoomTo(zoom * factor, mouseX, mouseY);
    }, { passive: false });

    // Pan with mouse drag — images only
    container.addEventListener('mousedown', (e) => {
      if (!mediaEl || isVideo) return;
      if (e.target.classList.contains('nav-arrow')) return;
      isDragging = true;
      mediaEl.classList.add('dragging');
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      panStartX = panX;
      panStartY = panY;
      e.preventDefault();
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      panX = panStartX + (e.clientX - dragStartX);
      panY = panStartY + (e.clientY - dragStartY);
      applyTransform();
    });

    window.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        if (mediaEl) mediaEl.classList.remove('dragging');
        clampPan();
      }
    });

    // Re-fit on any window resize OR container-size change, as long as
    // the user hasn't taken explicit zoom control. Simpler and more
    // reliable than the old 'zoom ≈ fitZoom' heuristic which failed when
    // the initial fit was computed against a pre-layout container size.
    window.addEventListener('resize', () => {
      if (!mediaEl || isVideo || userHasZoomed) return;
      fitToWindow();
    });
    window.addEventListener('load', () => {
      if (!mediaEl || isVideo || userHasZoomed) return;
      fitToWindow();
    });
    if ('ResizeObserver' in window) {
      const ro = new ResizeObserver(() => {
        if (!mediaEl || isVideo || userHasZoomed) return;
        fitToWindow();
      });
      ro.observe(container);
    }

    // Keyboard shortcuts
    window.addEventListener('keydown', (e) => {
      if (isVideo && (e.key === ' ' || e.code === 'Space')) {
        // Let <video> handle its own space-toggle when focused, otherwise toggle ourselves
        if (document.activeElement !== mediaEl) {
          e.preventDefault();
          if (mediaEl.paused) mediaEl.play(); else mediaEl.pause();
        }
        return;
      }
      // Rotate shortcuts — image only. R rotates left, Shift+R rotates right.
      // Letter case handles both Shift+R (uppercase) and unmodified r.
      if (!isVideo && (e.key === 'r' || e.key === 'R')) {
        e.preventDefault();
        rotateBy(e.shiftKey ? 90 : -90);
        return;
      }
      // Space toggles the slideshow on images. Doesn't fire when the
      // current media is a video — that branch above takes precedence.
      if (!isVideo && (e.key === ' ' || e.code === 'Space') && files.length > 1) {
        e.preventDefault();
        if (isSlideshowRunning()) stopSlideshow(); else startSlideshow();
        return;
      }
      // YouTube-style speed nudges: Shift+, slows down, Shift+. speeds up
      if (isVideo && e.shiftKey && (e.key === '<' || e.key === ',')) {
        const i = PLAYBACK_RATES.indexOf(playbackRate);
        if (i > 0) {
          playbackRate = PLAYBACK_RATES[i - 1];
          btnSpeed.textContent = playbackRate === 1 ? '1x' : (playbackRate + 'x');
          if (mediaEl) mediaEl.playbackRate = playbackRate;
          renderSpeedMenu();
        }
        e.preventDefault();
        return;
      }
      if (isVideo && e.shiftKey && (e.key === '>' || e.key === '.')) {
        const i = PLAYBACK_RATES.indexOf(playbackRate);
        if (i >= 0 && i < PLAYBACK_RATES.length - 1) {
          playbackRate = PLAYBACK_RATES[i + 1];
          btnSpeed.textContent = playbackRate === 1 ? '1x' : (playbackRate + 'x');
          if (mediaEl) mediaEl.playbackRate = playbackRate;
          renderSpeedMenu();
        }
        e.preventDefault();
        return;
      }
      if (e.key === '+' || e.key === '=') { userHasZoomed = true; zoomToCenter(zoom * 1.25); }
      else if (e.key === '-') { userHasZoomed = true; zoomToCenter(zoom / 1.25); }
      else if (e.key === '0') { userHasZoomed = true; zoomToCenter(1); }
      else if (e.key === 'f' || e.key === 'F') { userHasZoomed = false; fitToWindow(); }
      else if (e.key === 'ArrowLeft' && !isVideo) { stopSlideshow(); loadMedia(currentIndex - 1); }
      else if (e.key === 'ArrowRight' && !isVideo) { stopSlideshow(); loadMedia(currentIndex + 1); }
      else if (e.key === 'Escape') window.close();
    });

    // ── Cross-window Fix progress chip ─────────────────────────────
    // Same amber pill PDR shows on every other window. Subscribes to
    // the main process broadcast so users viewing a photo while a
    // Fix runs see the same status. Vanilla JS because this file
    // isn't React.
    (function () {
      const chipEl = document.getElementById('fix-chip');
      const textEl = document.getElementById('fix-chip-text');
      if (!chipEl || !textEl) return;
      function fmtTime(s) {
        if (!s || s < 0) return '';
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        if (h > 0) return h + 'h ' + m + 'm ' + sec + 's';
        if (m > 0) return m + 'm ' + sec + 's';
        return sec + 's';
      }
      function render(active, progress) {
        if (!active) { chipEl.classList.remove('visible'); return; }
        const phase = progress && progress.phase;
        const label = phase === 'prescan' ? 'Preparing'
          : phase === 'mirror' ? 'Uploading'
          : phase === 'staging' ? 'Staging'
          : phase === 'applying' ? 'Applying'
          : 'Working';
        let detail = '';
        if (progress) {
          if (phase === 'prescan') detail = (progress.prescanCount || 0).toLocaleString() + ' checked';
          else if (phase === 'mirror' && progress.mirrorTotal > 0) detail = progress.mirrorDone.toLocaleString() + '/' + progress.mirrorTotal.toLocaleString();
          else if (progress.total > 0) detail = progress.processed.toLocaleString() + '/' + progress.total.toLocaleString();
        }
        const parts = ['Fix', label];
        if (detail) parts.push(detail);
        if (progress && phase !== 'prescan' && phase !== 'mirror' && progress.progressPct > 0) parts.push(progress.progressPct + '%');
        if (progress && progress.elapsed > 0) parts.push(fmtTime(progress.elapsed));
        textEl.textContent = parts.join(' · ');
        chipEl.classList.add('visible');
      }
      let active = false;
      let lastProgress = null;
      // Cold-start: pull current state.
      try {
        if (window.pdr && window.pdr.getFixInProgress) {
          window.pdr.getFixInProgress().then(function (v) { active = !!v; render(active, lastProgress); }).catch(function () {});
        }
        if (window.pdr && window.pdr.getFixProgress) {
          window.pdr.getFixProgress().then(function (p) { lastProgress = p || null; render(active, lastProgress); }).catch(function () {});
        }
        // Live updates.
        if (window.pdr && window.pdr.onFixStateChanged) {
          window.pdr.onFixStateChanged(function (state) { active = !!(state && state.inProgress); render(active, lastProgress); });
        }
        if (window.pdr && window.pdr.onFixProgress) {
          window.pdr.onFixProgress(function (p) { lastProgress = p || null; render(active, lastProgress); });
        }
      } catch (e) { console.warn('[viewer] fix-chip wiring failed:', e); }
    })();
  </script>
</body>
</html>
